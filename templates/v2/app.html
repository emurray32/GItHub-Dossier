<script>
// Global toggle function — called directly by the button's onclick attribute
function toggleSidebar() {
    var s = document.getElementById('sidebar');
    if (!s) return;
    var isNowCollapsed = s.classList.toggle('collapsed');
    localStorage.setItem('sidebar-collapsed', isNowCollapsed);
}

// Auto-collapse on narrow viewports unless user explicitly opened it
(function() {
    var s = document.getElementById('sidebar');
    if (!s) return;
    var pref = localStorage.getItem('sidebar-collapsed');
    var narrow = window.innerWidth < 1200;
    if (pref === 'true' || (narrow && pref !== 'false')) {
        s.classList.add('collapsed');
    }
})();

document.addEventListener('DOMContentLoaded', function() {
    if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>

    if (!type) return 'Unknown';
    return SIGNAL_LABELS[type] || type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

    return SIGNAL_TYPE_COLORS[type] || DEFAULT_TYPE_COLOR;

    return STATUS_COLORS[status] || STATUS_COLORS.new;

// ═══════════════════════════════════════════════════════════════════════════
// TIME HELPERS
// ═══════════════════════════════════════════════════════════════════════════

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    const now = new Date();
    const diffMs = now - d;
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days < 7) return `${days}d ago`;
    if (days < 30) return `${Math.floor(days / 7)}w ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ═══════════════════════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════════════════════

async function apiFetch(url, options = {}) {
    const headers = options.body instanceof FormData
        ? { ...options.headers }
        : { 'Content-Type': 'application/json', ...options.headers };
    const resp = await fetch(url, {
        headers,
        ...options,
    });
    const contentType = resp.headers.get('content-type');
    if (!contentType || !contentType.includes('application/json')) {
        const text = await resp.text();
        throw new Error(resp.ok ? text : `Server error (${resp.status}): ${text.substring(0, 200)}`);
    }
    const data = await resp.json();
    if (!resp.ok || data.status === 'error') {
        throw new Error(data.message || `API error ${resp.status}`);
    }
    return data;
}

        'message-square': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
        'check-circle': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
    };
    return <span className={`inline-flex items-center ${className}`}>{svgMap[name] || null}</span>;
}

function Kbd({ children }) {
    return (
        <kbd className="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 text-[10px] font-mono font-semibold bg-slate-100 text-slate-500 border border-slate-300 rounded shadow-sm">

}

// TOAST SYSTEM
// ═══════════════════════════════════════════════════════════════════════════

let _toastId = 0;
const ToastContext = React.createContext(null);

function ToastProvider({ children }) {
    const [toasts, setToasts] = useState([]);

    const addToast = useCallback((message, type = 'success') => {
        const id = ++_toastId;
        setToasts(prev => [...prev, { id, message, type, exiting: false }]);
        setTimeout(() => {
            setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
            setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 250);
        }, 3000);
    }, []);

    return (
        <ToastContext.Provider value={addToast}>
            {children}
            <div className="v2-toast-container fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                {toasts.map(t => (
                    <div key={t.id}
                         className={`${t.exiting ? 'v2-toast-exit' : 'v2-toast-enter'} pointer-events-auto
                                     px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2
                                     ${t.type === 'error' ? 'bg-red-600 text-white' : t.type === 'info' ? 'bg-slate-800 text-white' : 'bg-green-600 text-white'}`}>
                        {t.type === 'error' ? <Icon name="x" size={14} /> : <Icon name="check" size={14} />}
                        {t.message}
                    </div>
                ))}
            </div>
        </ToastContext.Provider>
    );
}

function useToast() {
    return React.useContext(ToastContext);
}

function AutoTextarea({ value, onChange, onBlur, className = '', placeholder = '', readOnly }) {
    const ref = useRef(null);
    useEffect(() => {
        if (ref.current) {
            ref.current.style.height = '0';
            ref.current.style.height = ref.current.scrollHeight + 'px';
        }
    }, [value]);
    return (
        <textarea ref={ref} value={value} onChange={onChange} onBlur={onBlur}
            placeholder={placeholder} readOnly={readOnly}
            className={`v2-textarea w-full border border-slate-200 rounded-md px-3 py-2 text-sm ${className}`}
            style={{ overflow: 'hidden', resize: 'none' }} />
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// WRITING PREFERENCES PANEL
// ═══════════════════════════════════════════════════════════════════════════

const ORG_PREF_LABELS = {
    tone: { label: 'Tone', help: 'How emails should sound — peer vs. salesy, formal vs. casual', icon: 'message-square' },
    banned_phrases: { label: 'Banned Phrases', help: 'Comma-separated list of phrases to never use in emails', icon: 'x' },
    preferred_structure: { label: 'Email Structure', help: 'Default structure for cold emails (hook, pain, bridge, CTA)', icon: 'list' },
    cta_guidance: { label: 'CTA Guidance', help: 'Rules for calls-to-action — what to propose, what to avoid', icon: 'target' },
    signoff_guidance: { label: 'Signoff', help: 'How to close emails — name only, no "Best regards"', icon: 'check' },
    custom_rules: { label: 'Custom Rules', help: 'Any additional rules for email generation', icon: 'settings' },
};

const ORG_PREF_ORDER = ['tone', 'banned_phrases', 'preferred_structure', 'cta_guidance', 'signoff_guidance', 'custom_rules'];

const OVERRIDE_MODES = [
    { value: 'add', label: 'Add', desc: 'Appends to the org value' },
    { value: 'replace', label: 'Replace', desc: 'Fully overrides the org value' },
    { value: 'remove', label: 'Remove', desc: 'Subtracts items from org list' },
];

function WritingPrefsPanel({ onClose }) {
    const toast = useToast();
    const [activeSection, setActiveSection] = useState('org');

    // Org-wide state
    const [orgPrefs, setOrgPrefs] = useState({});
    const [orgLoading, setOrgLoading] = useState(true);
    const [orgSaving, setOrgSaving] = useState(false);
    const [orgDirty, setOrgDirty] = useState(false);
    const [activePrefKey, setActivePrefKey] = useState('tone');

    // BDR override state
    const [bdrEmails, setBdrEmails] = useState([]);
    const [selectedBdr, setSelectedBdr] = useState('');
    const [bdrPersonal, setBdrPersonal] = useState([]);
    const [bdrMerged, setBdrMerged] = useState({});
    const [bdrLoading, setBdrLoading] = useState(false);
    const [newOverride, setNewOverride] = useState({ key: 'banned_phrases', value: '', override_mode: 'add' });
    const [addingSaving, setAddingSaving] = useState(false);

    // Close on Escape or W (toggle)
    useEffect(() => {
        const handler = (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                if (e.key === 'Escape') { e.target.blur(); e.preventDefault(); }
                return;
            }
            if (e.key === 'Escape' || e.key === 'w') { e.preventDefault(); onClose(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
    }, [onClose]);

    // Load org prefs on mount
    useEffect(() => {
        setOrgLoading(true);
        apiFetch('/v2/api/writing-preferences')
            .then(data => { setOrgPrefs(data.preferences || {}); })
            .catch(err => toast(err.message, 'error'))
            .finally(() => setOrgLoading(false));
    }, []);

    // Load BDR email list on mount
    useEffect(() => {
        apiFetch('/v2/api/bdr-writing-preferences')
            .then(data => setBdrEmails(data.bdr_emails || []))
            .catch(() => {});
    }, []);

    // Load BDR prefs when selected
    useEffect(() => {
        if (!selectedBdr) { setBdrPersonal([]); setBdrMerged({}); return; }
        setBdrLoading(true);
        apiFetch(`/v2/api/bdr-writing-preferences/${encodeURIComponent(selectedBdr)}`)
            .then(data => {
                setBdrPersonal(data.personal || []);
                setBdrMerged(data.merged || {});
            })
            .catch(err => toast(err.message, 'error'))
            .finally(() => setBdrLoading(false));
    }, [selectedBdr]);

    // Save org prefs
    const saveOrgPrefs = async () => {
        setOrgSaving(true);
        try {
            await apiFetch('/v2/api/writing-preferences', {
                method: 'PUT',
                body: JSON.stringify(orgPrefs),
            });
            toast('Writing preferences saved');
            setOrgDirty(false);
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setOrgSaving(false);
        }
    };

    // Add BDR override
    const addBdrOverride = async () => {
        if (!selectedBdr || !newOverride.key || !newOverride.value.trim()) {
            toast('Key and value are required', 'error');
            return;
        }
        setAddingSaving(true);
        try {
            const data = await apiFetch(`/v2/api/bdr-writing-preferences/${encodeURIComponent(selectedBdr)}`, {
                method: 'PUT',
                body: JSON.stringify(newOverride),
            });
            setBdrMerged(data.merged || {});
            setNewOverride(prev => ({ ...prev, value: '' }));
            toast('Override saved');
            // Reload personal list
            const reloaded = await apiFetch(`/v2/api/bdr-writing-preferences/${encodeURIComponent(selectedBdr)}`);
            setBdrPersonal(reloaded.personal || []);
            // Add email to list if new
            if (!bdrEmails.includes(selectedBdr)) setBdrEmails(prev => [...prev, selectedBdr].sort());
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setAddingSaving(false);
        }
    };

    // Delete BDR override
    const deleteBdrOverride = async (key, mode) => {
        try {
            await apiFetch(`/v2/api/bdr-writing-preferences/${encodeURIComponent(selectedBdr)}/${encodeURIComponent(key)}?override_mode=${mode}`, {
                method: 'DELETE',
            });
            toast('Override removed');
            const reloaded = await apiFetch(`/v2/api/bdr-writing-preferences/${encodeURIComponent(selectedBdr)}`);
            setBdrPersonal(reloaded.personal || []);
            setBdrMerged(reloaded.merged || {});
        } catch (err) {
            toast(err.message, 'error');
        }
    };

    const sections = [
        { key: 'org', label: 'Org-Wide', icon: 'building' },
        { key: 'bdr', label: 'BDR Overrides', icon: 'user' },
    ];

    return (
        <div className="fixed inset-0 z-50 flex items-stretch bg-black/40 backdrop-blur-sm" onClick={onClose}>
            <div className="ml-auto w-full max-w-2xl bg-white shadow-2xl flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                {/* Header */}
                <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
                    <div className="flex items-center gap-2">
                        <Icon name="pen-tool" size={18} className="text-brand-600" />
                        <h2 className="text-base font-semibold text-slate-900">Writing Preferences</h2>
                    </div>
                    <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition-colors">
                        <Icon name="x" size={18} />
                    </button>
                </div>

                {/* Section tabs */}
                <div className="px-6 pt-3 flex gap-1 bg-slate-50 border-b border-slate-200 flex-shrink-0">
                    {sections.map(s => (
                        <button key={s.key}
                            onClick={() => setActiveSection(s.key)}
                            className={`flex items-center gap-1.5 px-3 py-2 text-sm font-medium rounded-t-md transition-all border-b-2
                                ${activeSection === s.key
                                    ? 'bg-white text-brand-700 border-brand-500 shadow-sm'
                                    : 'text-slate-500 hover:text-slate-700 border-transparent'}`}>
                            <Icon name={s.icon} size={14} />
                            {s.label}
                        </button>
                    ))}
                </div>

                {/* Body */}
                <div className="flex-1 overflow-y-auto v2-scrollbar">
                    {activeSection === 'org' && (
                        <div className="flex flex-col flex-1 min-h-0">
                            {orgLoading ? (
                                <div className="flex items-center justify-center py-12">
                                    <Icon name="loader" size={20} className="text-slate-400 animate-spin" />
                                </div>
                            ) : (
                                <div className="flex flex-1 min-h-0">
                                    {/* Preference tabs — vertical sidebar */}
                                    <div className="w-44 flex-shrink-0 border-r border-slate-200 bg-slate-50 py-2">
                                        {ORG_PREF_ORDER.map(key => {
                                            const meta = ORG_PREF_LABELS[key] || { label: key };
                                            const isActive = activePrefKey === key;
                                            const hasValue = !!(orgPrefs[key] || '').trim();
                                            return (
                                                <button key={key}
                                                    onClick={() => setActivePrefKey(key)}
                                                    className={`w-full flex items-center gap-2 px-4 py-2.5 text-left text-xs font-medium transition-all ${
                                                        isActive
                                                            ? 'bg-white text-brand-700 border-r-2 border-brand-500 shadow-sm'
                                                            : 'text-slate-500 hover:text-slate-700 hover:bg-white/60'
                                                    }`}>
                                                    <Icon name={meta.icon || 'file-text'} size={13} className={isActive ? 'text-brand-500' : 'text-slate-400'} />
                                                    <span className="truncate">{meta.label}</span>
                                                    {hasValue && <span className="ml-auto w-1.5 h-1.5 rounded-full bg-green-400 flex-shrink-0" />}
                                                </button>
                                            );
                                        })}
                                        <div className="px-4 pt-4 mt-2 border-t border-slate-200">
                                            <button onClick={saveOrgPrefs}
                                                disabled={orgSaving || !orgDirty}
                                                className="w-full px-3 py-2 bg-brand-600 text-white text-xs font-medium rounded-lg hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-1.5">
                                                {orgSaving ? <Icon name="loader" size={12} className="animate-spin" /> : <Icon name="save" size={12} />}
                                                {orgDirty ? 'Save Changes' : 'Saved'}
                                            </button>
                                            {orgDirty && <p className="text-[10px] text-amber-600 text-center mt-1.5">Unsaved changes</p>}
                                        </div>
                                    </div>

                                    {/* Active preference editor — full height */}
                                    {(() => {
                                        const meta = ORG_PREF_LABELS[activePrefKey] || { label: activePrefKey, help: '' };
                                        return (
                                            <div className="flex-1 flex flex-col p-5 min-h-0">
                                                <div className="mb-3 flex-shrink-0">
                                                    <h3 className="text-sm font-semibold text-slate-800 flex items-center gap-2">
                                                        <Icon name={meta.icon || 'file-text'} size={15} className="text-brand-500" />
                                                        {meta.label}
                                                    </h3>
                                                    {meta.help && <p className="text-xs text-slate-400 mt-1">{meta.help}</p>}
                                                </div>
                                                <textarea
                                                    value={orgPrefs[activePrefKey] || ''}
                                                    onChange={e => { setOrgPrefs(prev => ({ ...prev, [activePrefKey]: e.target.value })); setOrgDirty(true); }}
                                                    placeholder={`Enter ${meta.label.toLowerCase()} guidelines...`}
                                                    className="flex-1 w-full min-h-[200px] border border-slate-200 rounded-lg px-4 py-3 text-sm text-slate-700 leading-relaxed focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent resize-none" />
                                            </div>
                                        );
                                    })()}
                                </div>
                            )}
                        </div>
                    )}

                    {activeSection === 'bdr' && (
                        <div className="p-6 space-y-5">
                            <p className="text-xs text-slate-500">
                                Per-BDR overrides let individual reps customize their writing rules on top of org defaults.
                            </p>

                            {/* BDR selector */}
                            <div>
                                <label className="block text-xs font-semibold text-slate-700 mb-1">Select BDR</label>
                                <div className="flex gap-2">
                                    {bdrEmails.length > 0 ? (
                                        <select value={selectedBdr}
                                            onChange={e => setSelectedBdr(e.target.value)}
                                            className="flex-1 border border-slate-200 rounded-md px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                            <option value="">Choose a BDR...</option>
                                            {bdrEmails.map(em => <option key={em} value={em}>{em}</option>)}
                                        </select>
                                    ) : (
                                        <input type="email" placeholder="Enter BDR email address..."
                                            value={selectedBdr}
                                            onChange={e => setSelectedBdr(e.target.value)}
                                            className="flex-1 border border-slate-200 rounded-md px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                    )}
                                    {bdrEmails.length > 0 && (
                                        <input type="email" placeholder="Or type new email..."
                                            onKeyDown={e => { if (e.key === 'Enter' && e.target.value.trim()) { setSelectedBdr(e.target.value.trim()); e.target.value = ''; } }}
                                            className="w-48 border border-slate-200 rounded-md px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                    )}
                                </div>
                            </div>

                            {selectedBdr && bdrLoading && (
                                <div className="flex items-center justify-center py-8">
                                    <Icon name="loader" size={20} className="text-slate-400 animate-spin" />
                                </div>
                            )}

                            {selectedBdr && !bdrLoading && (
                                <>
                                    {/* Existing personal overrides */}
                                    {bdrPersonal.length > 0 && (
                                        <div>
                                            <h4 className="text-xs font-semibold text-slate-700 mb-2">Active Overrides</h4>
                                            <div className="space-y-2">
                                                {bdrPersonal.map((p, i) => (
                                                    <div key={i} className="flex items-start gap-2 bg-slate-50 rounded-md px-3 py-2 border border-slate-100">
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-xs font-semibold text-slate-700">
                                                                    {(ORG_PREF_LABELS[p.preference_key] || {}).label || p.preference_key}
                                                                </span>
                                                                <span className={`text-[10px] font-medium px-1.5 py-0.5 rounded
                                                                    ${p.override_mode === 'add' ? 'bg-green-100 text-green-700'
                                                                    : p.override_mode === 'replace' ? 'bg-blue-100 text-blue-700'
                                                                    : 'bg-red-100 text-red-700'}`}>
                                                                    {p.override_mode}
                                                                </span>
                                                            </div>
                                                            <p className="text-xs text-slate-500 mt-0.5 break-words">{p.preference_value}</p>
                                                        </div>
                                                        <button onClick={() => deleteBdrOverride(p.preference_key, p.override_mode)}
                                                            className="text-slate-400 hover:text-red-500 transition-colors flex-shrink-0 mt-0.5"
                                                            title="Remove override">
                                                            <Icon name="trash-2" size={13} />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Add new override */}
                                    <div className="border border-slate-200 rounded-lg p-4">
                                        <h4 className="text-xs font-semibold text-slate-700 mb-3">Add Override</h4>
                                        <div className="grid grid-cols-2 gap-3 mb-3">
                                            <div>
                                                <label className="block text-[11px] text-slate-500 mb-1">Preference</label>
                                                <select value={newOverride.key}
                                                    onChange={e => setNewOverride(prev => ({ ...prev, key: e.target.value }))}
                                                    className="w-full border border-slate-200 rounded-md px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                                    {ORG_PREF_ORDER.map(k => (
                                                        <option key={k} value={k}>{(ORG_PREF_LABELS[k] || {}).label || k}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-[11px] text-slate-500 mb-1">Mode</label>
                                                <select value={newOverride.override_mode}
                                                    onChange={e => setNewOverride(prev => ({ ...prev, override_mode: e.target.value }))}
                                                    className="w-full border border-slate-200 rounded-md px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                                                    {OVERRIDE_MODES.map(m => (
                                                        <option key={m.value} value={m.value}>{m.label} — {m.desc}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="mb-3">
                                            <label className="block text-[11px] text-slate-500 mb-1">Value</label>
                                            <textarea value={newOverride.value}
                                                onChange={e => setNewOverride(prev => ({ ...prev, value: e.target.value }))}
                                                rows={2}
                                                placeholder={newOverride.override_mode === 'add' ? 'Items to add (comma-separated for lists)...'
                                                    : newOverride.override_mode === 'remove' ? 'Items to remove from org list...'
                                                    : 'Full replacement value...'}
                                                className="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none" />
                                        </div>
                                        <button onClick={addBdrOverride}
                                            disabled={addingSaving || !newOverride.value.trim()}
                                            className="px-3 py-1.5 bg-brand-600 text-white text-xs font-medium rounded-md hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-1.5">
                                            {addingSaving ? <Icon name="loader" size={12} className="animate-spin" /> : <Icon name="plus" size={12} />}
                                            Save Override
                                        </button>
                                    </div>

                                    {/* Merged view */}
                                    {Object.keys(bdrMerged).length > 0 && (
                                        <div>
                                            <h4 className="text-xs font-semibold text-slate-700 mb-2">
                                                Merged View <span className="font-normal text-slate-400">(what this BDR will see)</span>
                                            </h4>
                                            <div className="space-y-2">
                                                {ORG_PREF_ORDER.map(key => {
                                                    if (!bdrMerged[key]) return null;
                                                    const meta = ORG_PREF_LABELS[key] || { label: key };
                                                    const isOverridden = bdrPersonal.some(p => p.preference_key === key);
                                                    return (
                                                        <div key={key} className={`rounded-md px-3 py-2 border ${isOverridden ? 'bg-brand-50 border-brand-100' : 'bg-slate-50 border-slate-100'}`}>
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-xs font-semibold text-slate-700">{meta.label}</span>
                                                                {isOverridden && <span className="text-[10px] font-medium px-1.5 py-0.5 rounded bg-brand-100 text-brand-700">customized</span>}
                                                            </div>
                                                            <p className="text-xs text-slate-500 mt-1 whitespace-pre-wrap break-words">{bdrMerged[key]}</p>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    )}
                </div>

                {/* Footer */}
                <div className="px-6 py-3 bg-slate-50 border-t border-slate-100 text-center flex-shrink-0">
                    <span className="text-xs text-slate-400">Press <Kbd>W</Kbd> or <Kbd>Esc</Kbd> to close</span>
                </div>
            </div>
        </div>
    );
}

function SignalTypeBadge({ type, size = 'sm' }) {
    const colors = signalColors(type);
    const label = signalLabel(type);
    const cls = size === 'sm' ? 'text-[0.6875rem] px-2 py-0.5' : 'text-xs px-2.5 py-1';
    return (
        <span className={`v2-badge ${colors.bg} ${colors.text} ${cls}`}>
            {label}
        </span>
    );
}

function QualityDots({ score }) {
    if (!score) return <span className="text-xs text-slate-300">--</span>;
    const colors = ['', 'bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-green-400', 'bg-emerald-500'];
    return (
        <div className="flex items-center gap-0.5" title={`BDR quality: ${score}/5`}>
            {[1,2,3,4,5].map(i => (
                <span key={i} className={`w-1.5 h-1.5 rounded-full ${i <= score ? colors[score] : 'bg-slate-200'}`} />
            ))}
        </div>
    );
}

function StatusBadge({ status, size = 'sm' }) {
    const colors = statusColors(status);
    const cls = size === 'sm' ? 'text-[0.6875rem] px-2 py-0.5' : 'text-xs px-2.5 py-1';
    return (
        <span className={`v2-badge ${colors.bg} ${colors.text} ${cls}`}>
            <span className={`w-1.5 h-1.5 rounded-full ${colors.dot} mr-1.5 inline-block`} />
            {status ? status.charAt(0).toUpperCase() + status.slice(1) : 'Unknown'}
        </span>
    );
}

function SignalTable({ signals, loading, activeIndex, onSelect, searchTerm }) {

        if (!searchTerm) return signals;
        const q = searchTerm.toLowerCase();
        return signals.filter(s =>
            (s.company_name || '').toLowerCase().includes(q) ||
            (s.signal_description || '').toLowerCase().includes(q) ||
            (s.signal_type || '').toLowerCase().includes(q) ||
            (s.account_owner || '').toLowerCase().includes(q) ||
            (s.outreach_angle || '').toLowerCase().includes(q)
        );
    }, [signals, searchTerm]);

    if (loading && signals.length === 0) {
        return (
            <div className="flex-1 flex items-center justify-center">
                <Icon name="loader" size={24} className="text-slate-300 animate-spin" />
            </div>
        );
    }

    if (filteredSignals.length === 0) {
        return (
            <div className="flex-1 flex items-center justify-center">
                <div className="text-center">
                    <Icon name="zap" size={32} className="text-slate-300 mx-auto mb-2" />
                    <p className="text-sm text-slate-400">{searchTerm ? 'No signals match your search' : 'No signals in this view'}</p>
                </div>

    return (
        <div className="flex-1 overflow-auto v2-scrollbar">

                        <th className="text-left px-3 py-2 font-medium w-8">#</th>
                        <th className="text-left px-3 py-2 font-medium" style={{minWidth: 160}}>Company</th>
                        <th className="text-left px-3 py-2 font-medium">Why It Matters</th>
                        <th className="text-left px-3 py-2 font-medium w-20">Owner</th>
                    </tr>
                </thead>
                <tbody>
                    {filteredSignals.map((sig, idx) => (
                        <tr key={sig.id}

                            </td>

                                {(() => {
                                    const type = sig.signal_type || '';
                                    const summary = sig.bdr_positioning || sig.outreach_angle || '';
                                    const parts = [];
                                    if (type) parts.push(<span key="t" className="font-medium text-slate-700">{SIGNAL_LABELS[type] || type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}:</span>);
                                    if (summary) {

                                    } else {

                                        parts.push(<span key="d"> {desc}</span>);

// COMPACT SIGNAL HEADER — Company + signal + campaign in one row

function SignalHeader({ workspace, onCampaignUpdate, toast }) {
    const { signal, account } = workspace;
    const [campaigns, setCampaigns] = useState([]);
    const [showCampaignPicker, setShowCampaignPicker] = useState(false);

    useEffect(() => {
        apiFetch('/v2/api/campaigns')
            .then(data => setCampaigns(data.campaigns || []))
            .catch(() => {});
    }, []);

    const handleCampaignChange = async (campaignId) => {
        const camp = campaigns.find(c => c.id === Number(campaignId));
        try {
            await apiFetch(`/v2/api/signals/${signal.id}/campaign`, {
                method: 'PUT',
                body: JSON.stringify({
                    campaign_id: Number(campaignId),
                    reasoning: `Campaign "${camp?.name || ''}" selected by rep`,
                }),
            });
            toast(`Campaign → ${camp?.name || 'updated'}`);
            setShowCampaignPicker(false);
            if (onCampaignUpdate) onCampaignUpdate();
        } catch (err) {
            toast(err.message, 'error');
        }
    };

    return (
        <div className="bg-white border border-slate-200 rounded-lg p-3">
            {/* Row 1: Company + badges + campaign pill */}
            <div className="flex items-center gap-2 flex-wrap">
                <h2 className="text-base font-semibold text-slate-900 truncate">{account.company_name}</h2>
                {account.website && (
                    <a href={account.website.startsWith('http') ? account.website : `https://${account.website}`}
                       target="_blank" rel="noopener noreferrer" title={account.website}
                       className="text-brand-600 hover:text-brand-700 flex-shrink-0">
                        <Icon name="external-link" size={12} />
                    </a>
                )}
                {account.industry && <span className="text-[0.625rem] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">{account.industry}</span>}
                {account.company_size && <span className="text-[0.625rem] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">{account.company_size}</span>}
                {account.annual_revenue && <span className="text-[0.625rem] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">{account.annual_revenue}</span>}
                <SignalTypeBadge type={signal.signal_type} size="sm" />
                <span className="text-[0.625rem] text-slate-400">
                    {signal.created_at ? new Date(signal.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : ''}
                </span>
                {signal.bdr_quality_score && <QualityDots score={signal.bdr_quality_score} />}

                {/* Campaign pill — right-aligned */}
                <div className="ml-auto flex items-center gap-1.5 relative">
                    <StatusBadge status={account.account_status} size="sm" />
                    <button onClick={() => setShowCampaignPicker(!showCampaignPicker)}
                        className="text-[0.6875rem] bg-brand-50 text-brand-700 px-2 py-0.5 rounded-full border border-brand-200 hover:bg-brand-100 transition-colors cursor-pointer flex items-center gap-1">
                        <Icon name="mail" size={10} />
                        {workspace.campaign?.name || 'No campaign'}
                    </button>
                    {showCampaignPicker && (
                        <>
                            <div className="fixed inset-0 z-10" onClick={() => setShowCampaignPicker(false)} />
                            <div className="absolute right-0 top-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg z-20 min-w-[200px]">
                                {campaigns.map(c => (
                                    <button key={c.id}
                                        onClick={() => handleCampaignChange(c.id)}
                                        className={`w-full text-left px-3 py-2 text-xs hover:bg-slate-50 border-b border-slate-50 last:border-0 ${
                                            c.id === signal.recommended_campaign_id ? 'bg-brand-50 text-brand-700 font-medium' : 'text-slate-700'
                                        }`}>
                                        {c.name}
                                    </button>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            </div>

            {/* Signal intel — single natural-language summary + evidence URLs */}
            {(() => {
                const summary = signal.outreach_angle || signal.bdr_positioning || signal.signal_description;
                const evidenceUrls = (() => {
                    if (!signal.evidence_value) return [];
                    const val = typeof signal.evidence_value === 'string' ? signal.evidence_value : JSON.stringify(signal.evidence_value);
                    const urlRegex = /https?:\/\/[^\s"',\]})]+/g;
                    return [...new Set(val.match(urlRegex) || [])];
                })();

                return summary ? (
                    <div className="mt-1.5 text-xs text-slate-600 leading-relaxed space-y-1">
                        <p>{summary}</p>
                        {evidenceUrls.length > 0 && (
                            <div className="flex flex-wrap gap-2 mt-1">
                                {evidenceUrls.map((url, i) => (
                                    <a key={i} href={url} target="_blank" rel="noopener noreferrer"
                                       className="inline-flex items-center gap-1 text-[0.6875rem] text-brand-600 hover:text-brand-700 hover:underline">
                                        <Icon name="external-link" size={10} className="flex-shrink-0" />
                                        {url.replace(/^https?:\/\//, '').split('/').slice(0, 2).join('/')}
                                    </a>
                                ))}
                            </div>
                        )}
                    </div>
                ) : null;
            })()}
        </div>
    );
}
