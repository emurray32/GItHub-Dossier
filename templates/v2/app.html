// INTAKE PANEL — Add signals when queue is empty
// ═══════════════════════════════════════════════════════════════════════════

function IntakePanel({ onSignalsAdded, signalCount = 0 }) {
    const toast = useToast();
    // CSV state
    const [csvFile, setCsvFile] = useState(null);
    const [csvUploading, setCsvUploading] = useState(false);
    const [csvResult, setCsvResult] = useState(null);
    const [clearExisting, setClearExisting] = useState(false);
    const fileInputRef = useRef(null);

    // File upload (CSV, Excel, or DOCX)
    const handleFileUpload = async () => {
        if (!csvFile) return;
        setCsvUploading(true);
        setCsvResult(null);
        try {
            const formData = new FormData();
            formData.append('file', csvFile);
            if (clearExisting) formData.append('clear_existing', 'true');
            const resp = await fetch('/v2/api/ingest/file', {
                method: 'POST',
                body: formData,
            });
            const data = await resp.json();
            if (!resp.ok || data.status === 'error') throw new Error(data.message || 'Upload failed');
            setCsvResult(data.result);
            // Handle Excel (multi-sheet) vs CSV/DOCX (flat) result shapes
            const created = data.result.totals
                ? data.result.totals.signals_created
                : data.result.signals_created;
            const sheetsInfo = data.result.sheets_processed
                ? ` across ${data.result.sheets_processed} sheet${data.result.sheets_processed > 1 ? 's' : ''}`
                : '';
            const enrichment = data.result.enrichment || (data.result.sheets?.[0]?.enrichment);
            const enrichParts = [];
            if (enrichment?.accounts_enriched) enrichParts.push(`${enrichment.accounts_enriched} enriched via Apollo`);
            if (enrichment?.signals_evaluated) enrichParts.push(`${enrichment.signals_evaluated} scored`);
            const enrichInfo = enrichParts.length ? ` (${enrichParts.join(', ')})` : '';
            const clearedCount = data.result.totals?.cleared || 0;
            const clearedInfo = clearedCount > 0 ? `Cleared ${clearedCount} old signals. ` : '';
            if (created > 0) {
                toast(`${clearedInfo}Created ${created} signals${sheetsInfo}${enrichInfo}`);
                onSignalsAdded();
            } else {
                toast('No signals created — check results below', 'info');
            }
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setCsvUploading(false);
        }
    };

    return (
        <div className="flex-1 flex items-start justify-center bg-slate-50 p-8 overflow-y-auto v2-scrollbar">
            <div className="w-full max-w-2xl">
                <div className="text-center mb-8">
                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-100 mb-4">
                        <Icon name="zap" size={32} className="text-brand-600" />
                    </div>
                    <h2 className="text-2xl font-semibold text-slate-900 mb-2">{signalCount > 0 ? 'Import Signals' : 'Get Started'}</h2>
                    <p className="text-sm text-slate-500 max-w-md mx-auto">
                        {signalCount > 0
                            ? 'Upload a spreadsheet or document to import signals.'
                            : 'Your signal queue is empty. Upload a spreadsheet or document to get started.'}
                    </p>
                </div>

                {/* File Upload */}
                {(
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
                        <h3 className="text-base font-semibold text-slate-900 mb-2">Upload Signals</h3>
                        <p className="text-sm text-slate-500 mb-2">
                            Upload an Excel, CSV, or Word document. Structured files auto-detect columns. Unstructured documents are parsed by AI.
                        </p>
                        <p className="text-xs text-slate-400 mb-4">
                            After import, new accounts are enriched via Apollo (industry, size, revenue) and each signal is scored for outreach potential (1-5).
                        </p>
                        <div
                            onClick={() => fileInputRef.current?.click()}
                            onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('border-brand-400', 'bg-brand-50'); }}
                            onDragLeave={e => { e.currentTarget.classList.remove('border-brand-400', 'bg-brand-50'); }}
                            onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('border-brand-400', 'bg-brand-50'); const f = e.dataTransfer.files[0]; if (f && /\.(csv|xlsx|xls|docx|txt|pdf)$/i.test(f.name)) setCsvFile(f); else toast('Please drop a .csv, .xlsx, .docx, .txt, or .pdf file', 'error'); }}
                            className="border-2 border-dashed border-slate-200 rounded-lg p-8 text-center cursor-pointer hover:border-brand-400 hover:bg-brand-50/50 transition-all">
                            <Icon name="upload" size={32} className="text-slate-400 mx-auto mb-3" />
                            {csvFile ? (
                                <div>
                                    <p className="text-sm font-medium text-slate-700">{csvFile.name}</p>
                                    <p className="text-xs text-slate-400 mt-1">{(csvFile.size / 1024).toFixed(1)} KB — {csvFile.name.endsWith('.csv') ? 'CSV' : csvFile.name.endsWith('.docx') ? 'Word Document' : csvFile.name.endsWith('.txt') ? 'Text File' : csvFile.name.endsWith('.pdf') ? 'PDF Document' : 'Excel'}</p>
                                </div>
                            ) : (
                                <div>
                                    <p className="text-sm text-slate-600 font-medium">Drop a file here or click to browse</p>
                                    <p className="text-xs text-slate-400 mt-1">.xlsx, .csv, .docx, .txt, .pdf — max 10 MB</p>
                                </div>
                            )}
                            <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls,.docx,.txt,.pdf" className="hidden"
                                onChange={e => setCsvFile(e.target.files?.[0] || null)} />
                        </div>
                        {csvFile && (
                            <div className="mt-4 space-y-3">
                                <label className="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" checked={clearExisting} onChange={e => setClearExisting(e.target.checked)}
                                        className="w-4 h-4 rounded border-slate-300 text-brand-600 focus:ring-brand-500" />
                                    <span className="text-sm text-slate-700 group-hover:text-slate-900">Replace all existing signals before import</span>
                                </label>
                                {clearExisting && (
                                    <p className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-md px-3 py-2">
                                        This will delete all current signals, accounts, and prospects before importing.
                                    </p>
                                )}
                                <button onClick={handleFileUpload}
                                    disabled={csvUploading}
                                    className="w-full px-4 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                                    {csvUploading ? <><Icon name="loader" size={16} /> Processing...</> : <><Icon name="upload" size={16} /> Upload & Import</>}
                                </button>
                            </div>
                        )}
                        {csvResult && (() => {
                            const totals = csvResult.totals || csvResult;
                            const created = totals.signals_created || 0;
                            const sheets = csvResult.sheets || [];
                            const errors = totals.errors || csvResult.errors || [];
                            return (
                                <div className={`mt-4 rounded-lg p-4 ${created > 0 ? 'bg-green-50 border border-green-200' : 'bg-amber-50 border border-amber-200'}`}>
                                    <p className={`text-sm font-medium ${created > 0 ? 'text-green-800' : 'text-amber-800'}`}>
                                        {totals.cleared > 0 && <span className="text-amber-700">{totals.cleared} old signals cleared. </span>}
                                        {created} signals created, {totals.accounts_created || 0} new accounts, {totals.accounts_matched || 0} matched
                                        {totals.skipped > 0 && <span className="text-slate-500"> ({totals.skipped} empty rows skipped)</span>}
                                    </p>
                                    {(() => {
                                        const enrich = csvResult.enrichment || (sheets.length > 0 && sheets[0].enrichment);
                                        if (!enrich) return null;
                                        const parts = [];
                                        if (enrich.accounts_enriched > 0) parts.push(`${enrich.accounts_enriched} accounts enriched via Apollo`);
                                        if (enrich.signals_evaluated > 0) parts.push(`${enrich.signals_evaluated} signals scored`);
                                        if (!parts.length) return null;
                                        return <p className="text-xs text-green-600 mt-1">{parts.join(' · ')}</p>;
                                    })()}
                                    {sheets.length > 1 && (
                                        <div className="mt-2 space-y-1">
                                            {sheets.map((s, i) => (
                                                <p key={i} className="text-xs text-slate-600">
                                                    Sheet "{s.sheet_name}": {s.signals_created} signals
                                                </p>
                                            ))}
                                        </div>
                                    )}
                                    {errors.length > 0 && (
                                        <div className="mt-2 max-h-32 overflow-y-auto">
                                            {errors.slice(0, 20).map((err, i) => (
                                                <p key={i} className="text-xs text-red-600">{err}</p>
                                            ))}
                                            {errors.length > 20 && <p className="text-xs text-red-500 mt-1">... and {errors.length - 20} more errors</p>}
                                        </div>
                                    )}
                                </div>
                            );
                        })()}
                    </div>
                )}
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// RIGHT PANEL — WORKSPACE
// ═══════════════════════════════════════════════════════════════════════════

function Workspace({ signalId, signalIndex, totalSignals, onMarkNoise, onSkip, onNextSignal, onReloadAndAdvance, onSignalsAdded, actionsRef }) {
    const toast = useToast();
    const [workspace, setWorkspace] = useState(null);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState(null);
    const [enrollmentReady, setEnrollmentReady] = useState(false);

    const loadWorkspace = useCallback(async () => {
        if (!signalId) return;
        setLoading(true);
        setError(null);
        setEnrollmentReady(false);
        try {
            const data = await apiFetch(`/v2/api/signals/${signalId}`);
            setWorkspace(data);
            setEnrollmentReady(Boolean(data.enrollment_ready));
        } catch (err) {
            setError(err.message);
        } finally {
            setLoading(false);
        }
    }, [signalId]);

    useEffect(() => {
        loadWorkspace();
    }, [loadWorkspace]);

    if (!signalId) {
        // If queue is truly empty, show intake panel instead of "select a signal"
        if (totalSignals === 0 && onSignalsAdded) {
            return <IntakePanel onSignalsAdded={onSignalsAdded} />;
        }
        return (
            <div className="flex-1 flex items-center justify-center bg-slate-50">
                <div className="text-center">
                    <Icon name="zap" size={48} className="text-slate-300 mx-auto mb-4" />
                    <p className="text-lg text-slate-400 font-medium">Select a signal from the queue to begin</p>
                    <p className="text-sm text-slate-300 mt-1">Use arrow keys to navigate, Enter to select</p>
                </div>
            </div>
        );
    }

    if (loading) {
        return (
            <div className="flex-1 overflow-y-auto v2-scrollbar bg-slate-50">
                <WorkspaceSkeleton />
            </div>
        );
    }

    if (error) {
        return (
            <div className="flex-1 flex items-center justify-center bg-slate-50">
                <div className="text-center">
                    <p className="text-red-500 text-sm mb-2">{error}</p>
                    <button onClick={loadWorkspace}
                        className="px-4 py-2 text-sm text-brand-600 border border-brand-200 rounded-md hover:bg-brand-50">
                        Retry
                    </button>
                </div>
            </div>
        );
    }

    if (!workspace) return null;

    return (
        <div className="flex-1 flex flex-col bg-slate-50 min-h-0">
            {/* Main scrollable content — compact spacing */}
            <div className="flex-1 overflow-y-auto v2-scrollbar px-4 py-3 pb-16 space-y-2">
                {/* Signal + Campaign header */}
                <SignalHeader workspace={workspace} onCampaignUpdate={loadWorkspace} toast={toast} />

                {/* Persona Search */}
                <PersonaSearch workspace={workspace} onProspectsSaved={async () => {
                    const data = await apiFetch(`/v2/api/signals/${signalId}`);
                    // Auto-generate drafts for all prospects that don't have any
                    const prospects = data?.prospects || [];
                    const existingDrafts = data?.drafts || [];
                    const prospectIdsWithDrafts = new Set(existingDrafts.map(d => d.prospect_id));
                    let generatedAny = false;
                    let fallbackGenerated = false;
                    for (const p of prospects) {
                        if (!prospectIdsWithDrafts.has(p.id) && !p.do_not_contact) {
                            try {
                                const generated = await apiFetch('/v2/api/drafts/generate', {
                                    method: 'POST',
                                    body: JSON.stringify({
                                        prospect_id: p.id,
                                        signal_id: data.signal.id,
                                        campaign_id: data.signal.recommended_campaign_id || 0,
                                        sequence_config: data.campaign?.sequence_config
                                            ? (typeof data.campaign.sequence_config === 'string'
                                                ? JSON.parse(data.campaign.sequence_config)
                                                : data.campaign.sequence_config)
                                            : { num_steps: 4, single_thread: true },
                                    }),
                                });
                                generatedAny = true;
                                if ((generated.drafts || []).some(d => d.generation_notes)) {
                                    fallbackGenerated = true;
                                }
                            } catch (err) {
                                toast(`Draft gen failed for ${p.first_name || 'prospect'}: ${err.message}`, 'error');
                            }
                        }
                    }
                    if (generatedAny) {
                        const refreshed = await apiFetch(`/v2/api/signals/${signalId}`);
                        setWorkspace(refreshed);
                        setEnrollmentReady(Boolean(refreshed.enrollment_ready));
                        toast(
                            fallbackGenerated
                                ? 'Contacts saved and fallback drafts generated — review carefully before approving'
                                : 'Contacts saved and drafts generated',
                            fallbackGenerated ? 'info' : undefined
                        );
                    } else {
                        setWorkspace(data);
                        setEnrollmentReady(Boolean(data.enrollment_ready));
                    }
                }} toast={toast} actionsRef={actionsRef} />

                {/* Draft Review (visible if prospects exist) */}
                {workspace.prospects && workspace.prospects.length > 0 && (
                    <DraftReview key={workspace.signal.id} workspace={workspace} toast={toast} actionsRef={actionsRef} onAllApproved={() => setEnrollmentReady(true)} />
                )}

                {/* Enrollment (only visible after drafts are approved) */}
                {enrollmentReady && workspace.prospects && workspace.prospects.length > 0 && (
                    <Enrollment key={workspace.signal.id} workspace={workspace} onNextSignal={onReloadAndAdvance || onNextSignal} toast={toast} actionsRef={actionsRef} />
                )}
            </div>

            {/* Bottom bar — contextual hints (Superhuman-style) */}
            <div className="v2-bottom-bar border-t border-slate-200 bg-white px-4 py-2 flex items-center justify-between flex-shrink-0">
                <div className="flex items-center gap-3">
                    <span className="text-xs text-slate-400 tabular-nums">
                        {signalIndex + 1} / {totalSignals}
                    </span>
                    <span className="text-[0.625rem] text-slate-300 hidden sm:flex items-center gap-1.5 flex-wrap">
                        {workspace && workspace.prospects && workspace.prospects.length > 0 ? (
                            <>
                                <Kbd>1</Kbd><Kbd>2</Kbd><Kbd>3</Kbd>
                                <span className="text-slate-300">target prospect</span>
                                <span className="text-slate-200 mx-0.5">&bull;</span>
                                <Kbd>j</Kbd><Kbd>k</Kbd>
                                <span className="text-slate-300">prev/next</span>
                                <span className="text-slate-200 mx-0.5">&bull;</span>
                                <Kbd>s</Kbd>
                                <span className="text-slate-300">skip</span>
                                <span className="text-slate-200 mx-0.5">&bull;</span>
                                <Kbd>?</Kbd>
                                <span className="text-slate-300">help</span>
                            </>
                        ) : (
                            <>
                                <Kbd>F</Kbd>
                                <span className="text-slate-300">search Apollo</span>
                                <span className="text-slate-200 mx-0.5">&bull;</span>
                                <Kbd>j</Kbd><Kbd>k</Kbd>
                                <span className="text-slate-300">navigate</span>
                                <span className="text-slate-200 mx-0.5">&bull;</span>
                                <Kbd>?</Kbd>
                                <span className="text-slate-300">help</span>
                            </>
                        )}
                    </span>
                </div>
                <div className="flex items-center gap-2">
                    <button onClick={onMarkNoise}
                        className="px-2.5 py-1 text-xs font-medium text-slate-400 border border-slate-200 rounded-md hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-all flex items-center gap-1.5">
                        Noise <Kbd>n</Kbd>
                    </button>
                    <button onClick={onSkip}
                        className="px-2.5 py-1 text-xs font-medium text-slate-400 border border-slate-200 rounded-md hover:bg-slate-50 transition-all flex items-center gap-1.5">
                        Skip <Kbd>s</Kbd>
                    </button>
                </div>
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════

function App() {
    const toast = useToast();

    // Signal queue state
    const [signals, setSignals] = useState([]);
    const [total, setTotal] = useState(0);
    const [loading, setLoading] = useState(true);
    const [statusFilter, setStatusFilter] = useState('new');
    const [ownerFilter, setOwnerFilter] = useState(null);
    const [owners, setOwners] = useState([]);
    const [counts, setCounts] = useState({});
    const [activeSignalId, setActiveSignalId] = useState(null);
    const [activeIndex, setActiveIndex] = useState(-1);
    const [showIntake, setShowIntake] = useState(() => {
        try {
            const searchParams = new URLSearchParams(window.location.search);
            return searchParams.get('intake') === '1';
        } catch {
            return false;
        }
    });
    const [showHelp, setShowHelp] = useState(false);
    const [searchTerm, setSearchTerm] = useState('');

    // Ref for workspace child components to register their keyboard-triggered actions
    const workspaceActionsRef = useRef({});

    const syncIntakeQueryParam = useCallback((enabled) => {
        try {
            const url = new URL(window.location.href);
            if (enabled) url.searchParams.set('intake', '1');
            else url.searchParams.delete('intake');
            window.history.replaceState({}, '', `${url.pathname}${url.search}${url.hash}`);
        } catch {}
    }, []);

    const openIntake = useCallback(() => {
        setActiveSignalId(null);
        setActiveIndex(-1);
        setShowIntake(true);
        syncIntakeQueryParam(true);
    }, [syncIntakeQueryParam]);

    const closeIntake = useCallback(() => {
        setShowIntake(false);
        syncIntakeQueryParam(false);
    }, [syncIntakeQueryParam]);

    // Filtered signals for keyboard navigation when search is active
    const filteredSignals = useMemo(() => {
        if (!searchTerm) return signals;
        const q = searchTerm.toLowerCase();
        return signals.filter(s =>
            (s.company_name || '').toLowerCase().includes(q) ||
            (s.signal_description || '').toLowerCase().includes(q) ||
            (s.signal_type || '').toLowerCase().includes(q) ||
            (s.account_owner || '').toLowerCase().includes(q) ||
            (s.outreach_angle || '').toLowerCase().includes(q)
        );
    }, [signals, searchTerm]);

    // Load signals (also refreshes counts so they stay in sync after any action)
    const loadSignals = useCallback(async () => {
        setLoading(true);
        try {
            const params = new URLSearchParams();
            if (statusFilter) params.set('status', statusFilter);
            if (ownerFilter) params.set('owner', ownerFilter);
            params.set('limit', '500');

            const data = await apiFetch(`/v2/api/signals?${params}`);
            const fresh = data.signals || [];
            setSignals(fresh);
            setTotal(data.total || 0);

            // Refresh counts every time signals are loaded so sidebar stays truthful
            apiFetch('/v2/api/signals/counts')
                .then(c => setCounts(c.counts || {}))
                .catch(() => {});

            return fresh;
        } catch (err) {
            if (toast) toast(err.message, 'error');
            return null;
        } finally {
            setLoading(false);
        }
    }, [statusFilter, ownerFilter]);

    // Load owners + counts on mount
    useEffect(() => {
        apiFetch('/v2/api/signals/owners')
            .then(data => setOwners(data.owners || []))
            .catch(() => {});
        apiFetch('/v2/api/signals/counts')
            .then(data => setCounts(data.counts || {}))
            .catch(() => {});
    }, []);

    // Reset position and reload when filter changes
    useEffect(() => {
        setActiveSignalId(null);
        setActiveIndex(-1);
        loadSignals();
    }, [loadSignals]);

    // Select signal
    const selectSignal = useCallback((id) => {
        setActiveSignalId(id);
        const idx = signals.findIndex(s => s.id === id);
        setActiveIndex(idx);
    }, [signals]);

    // Navigate to next signal
    const nextSignal = useCallback(() => {
        const nextIdx = activeIndex + 1;
        if (nextIdx < signals.length) {
            selectSignal(signals[nextIdx].id);
        } else {
            // Refresh the queue
            loadSignals();
            setActiveSignalId(null);
            setActiveIndex(-1);
        }
    }, [activeIndex, signals, selectSignal, loadSignals]);

    // Skip = same as next
    const skipSignal = useCallback(() => {
        nextSignal();
    }, [nextSignal]);

    // Reload queue and select next signal from FRESH data.
    // Used after any action that changes queue membership (noise, enrollment, etc).
    // Sets both activeSignalId and activeIndex directly from the fresh array
    // to avoid the stale-closure bug where selectSignal searches the old signals array.
    const reloadAndAdvance = useCallback(async () => {
        const prevIdx = activeIndex;
        const fresh = await loadSignals();
        if (fresh && fresh.length > 0) {
            const nextIdx = Math.min(Math.max(prevIdx, 0), fresh.length - 1);
            setActiveSignalId(fresh[nextIdx].id);
            setActiveIndex(nextIdx);
        } else {
            setActiveSignalId(null);
            setActiveIndex(-1);
        }
    }, [activeIndex, loadSignals]);

    // Mark as noise (with confirmation — cascades to ALL signals for this account)
    const markNoise = useCallback(async () => {
        if (!activeSignalId) return;
        const sig = signals.find(s => s.id === activeSignalId);
        if (!sig) return;

        const company = sig.company_name || 'this account';
        if (!window.confirm(`Mark "${company}" as noise?\n\nThis will archive ALL signals for this account.`)) return;

        try {
            await apiFetch(`/v2/api/accounts/${sig.account_id}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'noise' }),
            });
            toast(`"${company}" marked as noise`);
            await reloadAndAdvance();
        } catch (err) {
            toast(err.message, 'error');
        }
    }, [activeSignalId, signals, reloadAndAdvance, toast]);

    // Highlight first signal in list on initial load (but don not open the workspace)
    useEffect(() => {
        if (!loading && signals.length > 0 && activeIndex === -1) {
            setActiveIndex(0);
        }
    }, [loading, signals]);

    // Keyboard navigation + workflow shortcuts
    useEffect(() => {
        const handler = (e) => {
            // Always allow ? for help toggle, even if help is showing
            if (e.key === '?') {
                e.preventDefault();
                setShowHelp(prev => !prev);
                return;
            }

            // When in form fields, only Escape works (blurs the field)
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                if (e.key === 'Escape') {
                    e.target.blur();
                    e.preventDefault();
                }
                return;
            }

            // Skip shortcuts when help modal is open
            if (showHelp) return;

            const key = e.key;

            // --- Queue navigation (use filteredSignals when search is active) ---
            const navSignals = searchTerm ? filteredSignals : signals;
            const navIndex = activeIndex >= 0 && navSignals.length > 0
                ? navSignals.findIndex(s => s.id === (signals[activeIndex] || {}).id)
                : activeIndex;
            if (key === 'ArrowDown') {
                e.preventDefault();
                const nextIdx = Math.min((navIndex >= 0 ? navIndex : -1) + 1, navSignals.length - 1);
                if (navSignals[nextIdx]) selectSignal(navSignals[nextIdx].id);
            } else if (key === 'ArrowUp') {
                e.preventDefault();
                const prevIdx = Math.max((navIndex >= 0 ? navIndex : 1) - 1, 0);
                if (navSignals[prevIdx]) selectSignal(navSignals[prevIdx].id);
            } else if (key === 'Enter' && activeIndex >= 0) {
                e.preventDefault();
                const currentNavSignal = navIndex >= 0 && navSignals[navIndex] ? navSignals[navIndex] : signals[activeIndex];
                if (currentNavSignal) selectSignal(currentNavSignal.id);
            } else if (key === 'Escape') {
                if (showIntake) {
                    closeIntake();
                } else if (activeSignalId) {
                    // Back to table
                    setActiveSignalId(null);
                    setActiveIndex(-1);
                }
            }

            // --- Signal actions (only when a signal is selected) ---
            else if (key === 'n' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.openNoiseModal;
                if (action) action();
                else markNoise();
            } else if (key === 's' && activeSignalId && !showIntake) {
                e.preventDefault();
                skipSignal();
            } else if (key === 'Enter' && e.metaKey && activeSignalId && !showIntake) {
                // Cmd+Enter → enroll all
                e.preventDefault();
                const action = workspaceActionsRef.current.openEnrollModal;
                if (action) action();
            } else if (key === 'Enter' && activeSignalId && !showIntake) {
                // Enter → advance to next draft step for focused prospect
                e.preventDefault();
                const action = workspaceActionsRef.current.nextDraftStep;
                if (action) action();
            }

            // --- Panels ---
            else if (key === 'i') {
                e.preventDefault();
                if (showIntake) closeIntake();
                else openIntake();
            }

            // --- Workflow shortcuts (delegated to workspace child components) ---
            else if (key === 'f' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.search;
                if (action) action();
            } else if (key === 'g' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.generateDrafts;
                if (action) action();
            } else if (key === 'a' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.approveCurrent || workspaceActionsRef.current.approveAll;
                if (action) action();
            } else if (key === 'e' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.enrollAll;
                if (action) action();
            }

            // --- Prospect navigation (j/k) and draft step tabs (1/2/3) ---
            else if (key === 'j' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.nextProspect;
                if (action) action();
            } else if (key === 'k' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.prevProspect;
                if (action) action();
            } else if ((key === '1' || key === '2' || key === '3') && activeSignalId && !showIntake) {
                // Jump to prospect 1/2/3 and auto-generate drafts
                e.preventDefault();
                const action = workspaceActionsRef.current.jumpToProspect;
                if (action) action(Number(key));
            } else if (key === '/') {
                // Focus search box
                e.preventDefault();
                const searchInput = document.querySelector('input[placeholder="Search..."]');
                if (searchInput) searchInput.focus();
            }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
    }, [activeIndex, signals, filteredSignals, searchTerm, selectSignal, activeSignalId, showIntake, showHelp, markNoise, skipSignal, openIntake, closeIntake]);

    const goBackToTable = useCallback(() => {
        setActiveSignalId(null);
        setActiveIndex(-1);
        closeIntake();
    }, [closeIntake]);

    return (
        <div className="flex flex-col h-screen overflow-hidden">
            <TopBar
                statusFilter={statusFilter}
                onStatusFilter={setStatusFilter}
                counts={counts}
                searchTerm={searchTerm}
                onSearchChange={setSearchTerm}
                ownerFilter={ownerFilter}
                onOwnerFilter={setOwnerFilter}
                owners={owners}
                total={total}
                onAddSignals={openIntake}
                onShowHelp={() => setShowHelp(true)}
                onBack={goBackToTable}
                showBack={!!activeSignalId}
            />
            {showIntake ? (
                <IntakePanel signalCount={signals.length} onSignalsAdded={async () => {
                    closeIntake();
                    const fresh = await loadSignals();
                    if (fresh && fresh.length > 0) {
                        setActiveSignalId(fresh[0].id);
                        setActiveIndex(0);
                    }
                }} />
            ) : activeSignalId ? (
                <Workspace
                    signalId={activeSignalId}
                    signalIndex={activeIndex >= 0 ? activeIndex : 0}
                    totalSignals={total}
                    onMarkNoise={markNoise}
                    onSkip={skipSignal}
                    onNextSignal={nextSignal}
                    onReloadAndAdvance={reloadAndAdvance}
                    onSignalsAdded={async () => { const fresh = await loadSignals(); if (fresh && fresh.length > 0 && !activeSignalId) { setActiveSignalId(fresh[0].id); setActiveIndex(0); } }}
                    actionsRef={workspaceActionsRef}
                />
            ) : (
                <SignalTable
                    signals={signals}
                    loading={loading}
                    activeIndex={activeIndex}
                    onSelect={(id) => { closeIntake(); selectSignal(id); }}
                    searchTerm={searchTerm}
                />
            )}
            {showHelp && <KeyboardHelp onClose={() => setShowHelp(false)} />}
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════════════════

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
    <ToastProvider>
        <App />
    </ToastProvider>
);
</script>
{% endraw %}
