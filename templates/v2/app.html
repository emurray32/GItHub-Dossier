// COMPACT SIGNAL HEADER — Company + signal + campaign in one row
// ═══════════════════════════════════════════════════════════════════════════

function SignalHeader({ workspace, onCampaignUpdate, toast }) {
    const { signal, account } = workspace;
    const [campaigns, setCampaigns] = useState([]);
    const [showCampaignPicker, setShowCampaignPicker] = useState(false);
    const [evidenceOpen, setEvidenceOpen] = useState(false);

    useEffect(() => {
        apiFetch('/v2/api/campaigns')
            .then(data => setCampaigns(data.campaigns || []))
            .catch(() => {});
    }, []);

    const handleCampaignChange = async (campaignId) => {
        const camp = campaigns.find(c => c.id === Number(campaignId));
        try {
            await apiFetch(`/v2/api/signals/${signal.id}/campaign`, {
                method: 'PUT',
                body: JSON.stringify({
                    campaign_id: Number(campaignId),
                    reasoning: `Campaign "${camp?.name || ''}" selected by rep`,
                }),
            });
            toast(`Campaign → ${camp?.name || 'updated'}`);
            setShowCampaignPicker(false);
            if (onCampaignUpdate) onCampaignUpdate();
        } catch (err) {
            toast(err.message, 'error');
        }
    };

    return (
        <div className="bg-white border border-slate-200 rounded-lg p-3">
            {/* Row 1: Company + badges + campaign pill */}
            <div className="flex items-center gap-2 flex-wrap">
                <h2 className="text-base font-semibold text-slate-900 truncate">{account.company_name}</h2>
                {account.website && (
                    <a href={account.website.startsWith('http') ? account.website : `https://${account.website}`}
                       target="_blank" rel="noopener noreferrer" title={account.website}
                       className="text-brand-600 hover:text-brand-700 flex-shrink-0">
                        <Icon name="external-link" size={12} />
                    </a>
                )}
                {account.industry && <span className="text-[0.625rem] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">{account.industry}</span>}
                {account.company_size && <span className="text-[0.625rem] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">{account.company_size}</span>}
                {account.annual_revenue && <span className="text-[0.625rem] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">{account.annual_revenue}</span>}
                <SignalTypeBadge type={signal.signal_type} size="sm" />
                <span className="text-[0.625rem] text-slate-400">
                    {signal.created_at ? new Date(signal.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : ''}
                </span>
                {signal.bdr_quality_score && <QualityDots score={signal.bdr_quality_score} />}

                {/* Campaign pill — right-aligned */}
                <div className="ml-auto flex items-center gap-1.5 relative">
                    <StatusBadge status={account.account_status} size="sm" />
                    <button onClick={() => setShowCampaignPicker(!showCampaignPicker)}
                        className="text-[0.6875rem] bg-brand-50 text-brand-700 px-2 py-0.5 rounded-full border border-brand-200 hover:bg-brand-100 transition-colors cursor-pointer flex items-center gap-1">
                        <Icon name="mail" size={10} />
                        {workspace.campaign?.name || 'No campaign'}
                    </button>
                    {showCampaignPicker && (
                        <div className="absolute right-0 top-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg z-20 min-w-[200px]">
                            {campaigns.map(c => (
                                <button key={c.id}
                                    onClick={() => handleCampaignChange(c.id)}
                                    className={`w-full text-left px-3 py-2 text-xs hover:bg-slate-50 border-b border-slate-50 last:border-0 ${
                                        c.id === signal.recommended_campaign_id ? 'bg-brand-50 text-brand-700 font-medium' : 'text-slate-700'
                                    }`}>
                                    {c.name}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            </div>

            {/* Row 2: Signal description — one compact line */}
            <p className="text-xs text-slate-600 mt-1.5 leading-relaxed line-clamp-2">{signal.signal_description}</p>

            {/* BDR positioning + evidence — compact */}
            <div className="flex items-start gap-3 mt-1.5">
                {signal.bdr_positioning && (
                    <div className="flex items-start gap-1.5 text-[0.6875rem] text-brand-600 flex-1 min-w-0">
                        <Icon name="target" size={11} className="text-brand-500 mt-0.5 flex-shrink-0" />
                        <span className="line-clamp-1">{signal.bdr_positioning}</span>
                    </div>
                )}
                {signal.evidence_value && (
                    <button onClick={() => setEvidenceOpen(!evidenceOpen)}
                        className="text-[0.625rem] text-brand-600 hover:text-brand-700 flex-shrink-0 flex items-center gap-0.5">
                        <Icon name={evidenceOpen ? 'chevron-up' : 'chevron-down'} size={10} />
                        evidence
                    </button>
                )}
            </div>

            {evidenceOpen && signal.evidence_value && (
                <pre className="mt-1.5 bg-slate-50 rounded p-2 text-[0.625rem] text-slate-600 whitespace-pre-wrap break-words font-mono border border-slate-100 max-h-24 overflow-y-auto">
                    {typeof signal.evidence_value === 'string' ? signal.evidence_value : JSON.stringify(signal.evidence_value, null, 2)}
                </pre>
            )}
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// SECTION 3 — PERSONA SEARCH
// ═══════════════════════════════════════════════════════════════════════════

function PersonaSearch({ workspace, onProspectsSaved, toast, actionsRef }) {
    // Build persona tiers from campaign personas — one chip per tier,
    // but each tier carries ALL its titles for the Apollo search
    const defaultPersonas = useMemo(() => {
        if (workspace.personas && workspace.personas.length > 0) {
            const tiers = [];
            for (const p of workspace.personas) {
                let titles = [];
                let seniorities = [];
                try { titles = typeof p.titles_json === 'string' ? JSON.parse(p.titles_json) : (p.titles_json || []); } catch { titles = []; }
                try { seniorities = typeof p.seniorities_json === 'string' ? JSON.parse(p.seniorities_json) : (p.seniorities_json || []); } catch { seniorities = []; }
                if (titles.length === 0) continue;
                tiers.push({
                    title: titles[0],              // Display: first title
                    allTitles: titles,              // Search: all titles in this tier
                    seniority: seniorities[0] || '',
                    tierName: p.persona_name || titles[0],
                });
            }
            if (tiers.length > 0) return tiers;
        }
        return [
            { title: 'VP Engineering', allTitles: ['VP Engineering', 'VP of Engineering', 'Head of Engineering', 'CTO', 'Director of Engineering'], seniority: 'vp', tierName: 'Engineering Leader' },
            { title: 'Localization Manager', allTitles: ['Localization Manager', 'Head of Localization', 'Director of Localization'], seniority: 'manager', tierName: 'Localization Leader' },
            { title: 'Head of Product', allTitles: ['Head of Product', 'VP Product', 'Director of Product'], seniority: 'vp', tierName: 'Product Leader' },
        ];
    }, [workspace.signal.id]);

    const [personas, setPersonas] = useState(defaultPersonas);
    const [newTitle, setNewTitle] = useState('');
    const [newSeniority, setNewSeniority] = useState('');
    const [searching, setSearching] = useState(false);
    const [results, setResults] = useState([]);
    const [selected, setSelected] = useState(new Set());
    const [savingProspects, setSavingProspects] = useState(false);

    useEffect(() => {
        setPersonas(defaultPersonas);
        setResults([]);
        setSelected(new Set());
    }, [workspace.signal.id]);

    const addPersona = () => {
        if (!newTitle.trim()) return;
        setPersonas(prev => [...prev, { title: newTitle.trim(), seniority: newSeniority || '' }]);
        setNewTitle('');
        setNewSeniority('');
    };

    const removePersona = (idx) => {
        setPersonas(prev => prev.filter((_, i) => i !== idx));
    };

    const handleSearch = async () => {
        if (personas.length === 0) {
            toast('Add at least one persona to search', 'error');
            return;
        }
        setSearching(true);
        setResults([]);
        try {
            // Send full persona tiers with allTitles for broader search
            const searchPersonas = personas.map(p => ({
                title: p.title,
                allTitles: p.allTitles || [p.title],
                seniority: p.seniority || '',
            }));
            // Search + auto-save in one API call (backend handles enrichment + saving)
            const data = await apiFetch(`/v2/api/signals/${workspace.signal.id}/search`, {
                method: 'POST',
                body: JSON.stringify({ personas: searchPersonas, verified_only: true, max_results: 3 }),
            });
            const people = data.people || [];
            const savedCount = data.saved_count || 0;
            setResults(people);
            setSelected(new Set(people.map((_, i) => i)));
            if (people.length === 0) {
                toast(`No verified contacts found (${data.candidates_found || 0} candidates checked)`, 'info');
            } else {
                toast(`Found & saved ${savedCount} contact${savedCount !== 1 ? 's' : ''} — ready for drafts`);
                // Auto-refresh workspace to show saved prospects in draft section
                if (onProspectsSaved) onProspectsSaved();
            }
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSearching(false);
        }
    };

    // Register search action on actionsRef for keyboard shortcut (F)
    useEffect(() => {
        if (!actionsRef) return;
        actionsRef.current = { ...actionsRef.current, search: handleSearch };
        return () => { const c = { ...actionsRef.current }; delete c.search; actionsRef.current = c; };
    });

    const toggleSelect = (idx) => {
        setSelected(prev => {
            const next = new Set(prev);
            if (next.has(idx)) next.delete(idx);
            else next.add(idx);
            return next;
        });
    };

    const selectAll = () => {
        const actionable = results
            .map((r, i) => ({ r, i }))
            .filter(({ r }) => !r.do_not_contact && r.enrollment_status !== 'enrolled');
        setSelected(new Set(actionable.map(({ i }) => i)));
    };

    const deselectAll = () => setSelected(new Set());

    const handleSave = async () => {
        const prospects = Array.from(selected).map(i => results[i]).filter(Boolean);
        if (prospects.length === 0) return;
        setSavingProspects(true);
        try {
            const result = await apiFetch('/v2/api/prospects', {
                method: 'POST',
                body: JSON.stringify({
                    signal_id: workspace.signal.id,
                    account_id: workspace.account.id,
                    prospects,
                }),
            });
            const saved = result.count || 0;
            const skipped = (result.skipped_enrolled || 0) + (result.skipped_personal || 0) +
                            (result.skipped_no_email || 0) + (result.skipped_unverified || 0) + (result.skipped_dnc || 0);
            let msg = `Saved ${saved} prospect${saved !== 1 ? 's' : ''}`;
            if (skipped > 0) {
                const reasons = [];
                if (result.skipped_unverified) reasons.push(`${result.skipped_unverified} unverified`);
                if (result.skipped_personal) reasons.push(`${result.skipped_personal} personal email`);
                if (result.skipped_enrolled) reasons.push(`${result.skipped_enrolled} already enrolled`);
                if (result.skipped_no_email) reasons.push(`${result.skipped_no_email} no email`);
                if (result.skipped_dnc) reasons.push(`${result.skipped_dnc} DNC`);
                msg += ` (filtered: ${reasons.join(', ')})`;
            }
            toast(msg, skipped > 0 ? 'info' : 'success');
            setSelected(new Set());
            // Auto-generate drafts for each saved prospect
            if (result.prospect_ids && result.prospect_ids.length > 0) {
                toast('Generating drafts...', 'info');
                for (const pid of result.prospect_ids) {
                    try {
                        await apiFetch('/v2/api/drafts/generate', {
                            method: 'POST',
                            body: JSON.stringify({
                                prospect_id: pid,
                                signal_id: workspace.signal.id,
                                campaign_id: workspace.signal.recommended_campaign_id || 0,
                            }),
                        });
                    } catch (e) {
                        // Draft generation is best-effort — don't block the flow
                    }
                }
                toast('Drafts generated');
            }
            if (onProspectsSaved) onProspectsSaved();
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSavingProspects(false);
        }
    };

    const existingEmails = new Set((workspace.prospects || []).map(p => (p.email || '').toLowerCase()).filter(Boolean));

    return (
        <div className="bg-white rounded-lg border border-slate-200 p-3">
            {/* Persona pills row + search button */}
            <div className="flex flex-wrap items-center gap-1.5">
                {personas.map((p, i) => (
                    <div key={i} className="v2-chip" title={p.allTitles ? p.allTitles.join(', ') : p.title}>
                        {p.tierName || p.title}
                        {p.seniority && <span className="text-[0.625rem] text-indigo-400 ml-0.5">({p.seniority})</span>}
                        <button onClick={() => removePersona(i)} title="Remove">x</button>
                    </div>
                ))}
                <button onClick={handleSearch}
                    disabled={searching || personas.length === 0}
                    className="ml-auto px-3 py-1 bg-brand-600 text-white text-xs font-medium rounded hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all flex items-center gap-1.5">
                    {searching ? <Icon name="loader" size={12} /> : <Icon name="search" size={12} />}
                    {searching ? 'Searching...' : 'Search Apollo'}
                </button>
            </div>
            {/* Add custom persona — below pills */}
            <div className="flex items-center gap-1 mt-1.5">
                <input value={newTitle} onChange={e => setNewTitle(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addPersona()}
                    placeholder="+ Add title"
                    className="text-xs border border-slate-200 rounded px-2 py-1 w-28 focus:outline-none focus:border-brand-500" />
                <select value={newSeniority} onChange={e => setNewSeniority(e.target.value)}
                    className="text-xs border border-slate-200 rounded px-1.5 py-1 focus:outline-none focus:border-brand-500 bg-white w-20">
                    <option value="">Level</option>
                    <option value="c_suite">C-Suite</option>
                    <option value="vp">VP</option>
                    <option value="director">Dir</option>
                    <option value="manager">Mgr</option>
                    <option value="senior">Sr</option>
                </select>
                <button onClick={addPersona} className="px-1.5 py-1 border border-slate-200 rounded text-slate-500 hover:bg-slate-50">
                    <Icon name="plus" size={12} />
                </button>
            </div>

            {/* Results */}
            {results.length > 0 && (
                <div className="mt-2">
                    <div className="flex items-center justify-between mb-1">
                        <span className="text-xs font-medium text-slate-600">{results.length} verified contact{results.length !== 1 ? 's' : ''}</span>
                        <div className="flex gap-2">
                            <button onClick={selectAll} className="text-xs text-brand-600 hover:text-brand-700">Select all</button>
                            <button onClick={deselectAll} className="text-xs text-slate-400 hover:text-slate-600">Deselect all</button>
                        </div>
                    </div>
                    <div className="border border-slate-200 rounded-lg overflow-hidden">
                        <table className="w-full text-sm">
                            <thead>
                                <tr className="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
                                    <th className="w-8 px-3 py-2"></th>
                                    <th className="text-left px-3 py-2">Name</th>
                                    <th className="text-left px-3 py-2">Title</th>
                                    <th className="text-left px-3 py-2">Email</th>
                                    <th className="w-10 px-3 py-2"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {results.map((person, idx) => {
                                    const alreadyEnrolled = existingEmails.has((person.email || '').toLowerCase());
                                    const isDnc = person.do_not_contact;
                                    const disabled = alreadyEnrolled || isDnc;
                                    return (
                                        <tr key={idx}
                                            className={`border-t border-slate-100 transition-colors ${disabled ? 'opacity-50' : 'hover:bg-slate-50'}`}>
                                            <td className="px-3 py-2 text-center">
                                                <input type="checkbox"
                                                    checked={selected.has(idx)}
                                                    onChange={() => !disabled && toggleSelect(idx)}
                                                    disabled={disabled}
                                                    className="rounded border-slate-300 text-brand-600 focus:ring-brand-500" />
                                            </td>
                                            <td className="px-3 py-2 font-medium text-slate-800">
                                                {person.full_name || `${person.first_name || ''} ${person.last_name || ''}`.trim() || '--'}
                                            </td>
                                            <td className="px-3 py-2 text-slate-600">{person.title || '--'}</td>
                                            <td className="px-3 py-2">
                                                <div className="flex items-center gap-1">
                                                    <span className="text-slate-600">{person.email || '--'}</span>
                                                    {person.email_verified && (
                                                        <span className="text-green-500" title="Verified"><Icon name="check" size={12} /></span>
                                                    )}
                                                    {alreadyEnrolled && (
                                                        <span className="text-[0.625rem] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded ml-1">Already enrolled</span>
                                                    )}
                                                </div>
                                            </td>
                                            <td className="px-3 py-2">
                                                {person.linkedin_url && (
                                                    <a href={person.linkedin_url} target="_blank" rel="noopener noreferrer"
                                                       className="text-blue-600 hover:text-blue-700">
                                                        <Icon name="linkedin" size={14} />
                                                    </a>
                                                )}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {/* Contacts are auto-saved by search — no manual save needed */}
                </div>
            )}
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// SECTION 4 — DRAFT REVIEW
// ═══════════════════════════════════════════════════════════════════════════

function DraftReview({ workspace, toast, actionsRef }) {
    const prospects = workspace.prospects || [];
    const [drafts, setDrafts] = useState(() => {
        // Initialize from workspace.drafts so server-loaded drafts are editable
        const init = {};
        for (const d of (workspace.drafts || [])) {
            const pid = d.prospect_id;
            if (!init[pid]) init[pid] = [];
            init[pid].push(d);
        }
        return init;
    });
    const [generating, setGenerating] = useState({});
    const [regeneratingDraft, setRegeneratingDraft] = useState(null);
    const [critique, setCritique] = useState('');
    const [approving, setApproving] = useState(false);
    const [allApproved, setAllApproved] = useState(false);
    const [focusedProspectIdx, setFocusedProspectIdx] = useState(0);
    const [activeSteps, setActiveSteps] = useState({});
    const [inclusions, setInclusions] = useState(() => {
        const init = {};
        prospects.forEach(p => { if (!p.do_not_contact) init[p.id] = true; });
        return init;
    });
    const [showEnrollModal, setShowEnrollModal] = useState(false);
    const [showNoiseModal, setShowNoiseModal] = useState(false);
    const [postAction, setPostAction] = useState(null); // 'enrolled' | 'noise' | null

    const actionableProspects = prospects.filter(p => !p.do_not_contact);
    const includedProspects = actionableProspects.filter(p => inclusions[p.id]);

    if (actionableProspects.length === 0) return null;

    const handleGenerate = async (prospectId) => {
        setGenerating(prev => ({ ...prev, [prospectId]: true }));
        try {
            const data = await apiFetch('/v2/api/drafts/generate', {
                method: 'POST',
                body: JSON.stringify({
                    prospect_id: prospectId,
                    signal_id: workspace.signal.id,
                    campaign_id: workspace.signal.recommended_campaign_id || 0,
                }),
            });
            setDrafts(prev => ({ ...prev, [prospectId]: data.drafts || [] }));
            if (data.message) toast(data.message, 'info');
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setGenerating(prev => ({ ...prev, [prospectId]: false }));
        }
    };

    const handleDraftEdit = async (draftId, field, value) => {
        try {
            const payload = {};
            payload[field] = value;
            const data = await apiFetch(`/v2/api/drafts/${draftId}`, {
                method: 'PUT',
                body: JSON.stringify(payload),
            });
            // Update local draft state
            setDrafts(prev => {
                const updated = { ...prev };
                for (const pid of Object.keys(updated)) {
                    updated[pid] = updated[pid].map(d =>
                        d.id === draftId ? { ...d, ...payload, status: data.draft?.status || d.status } : d
                    );
                }
                return updated;
            });
        } catch (err) {
            toast('Failed to save edit: ' + err.message, 'error');
        }
    };

    const handleRegenerate = async (draftId) => {
        if (!critique.trim()) {
            toast('Enter feedback for regeneration', 'error');
            return;
        }
        try {
            const result = await apiFetch(`/v2/api/drafts/${draftId}/regenerate`, {
                method: 'POST',
                body: JSON.stringify({ critique: critique.trim() }),
            });
            // Refresh draft state with the regenerated draft from the server
            if (result && result.draft) {
                const updated = result.draft;
                const pid = updated.prospect_id;
                setDrafts(prev => {
                    const existing = prev[pid] || [];
                    const idx = existing.findIndex(d => d.id === updated.id || d.sequence_step === updated.sequence_step);
                    if (idx >= 0) {
                        const copy = [...existing];
                        copy[idx] = updated;
                        return { ...prev, [pid]: copy };
                    }
                    return { ...prev, [pid]: [...existing, updated] };
                });
            }
            toast('Draft regenerated', 'info');
            setRegeneratingDraft(null);
            setCritique('');
        } catch (err) {
            toast(err.message, 'error');
        }
    };

    const handleApproveAll = async () => {
        setApproving(true);
        try {
            // Step 1: Flush all local edits to server before approving
            const allLocalDrafts = Object.values(drafts).flat().filter(d => d.id);
            for (const d of allLocalDrafts) {
                await apiFetch(`/v2/api/drafts/${d.id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ subject: d.subject, body: d.body }),
                });
            }
            // Step 2: Approve all drafts (local + workspace, deduped)
            const sessionIds = allLocalDrafts.map(d => d.id);
            const workspaceIds = (workspace.drafts || []).map(d => d.id).filter(Boolean);
            const allDraftIds = [...new Set([...sessionIds, ...workspaceIds])];
            for (const id of allDraftIds) {
                await apiFetch(`/v2/api/drafts/${id}/approve`, { method: 'POST' });
            }
            setAllApproved(true);
            toast('All drafts approved');
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setApproving(false);
        }
    };

    // Register draft actions on actionsRef for keyboard shortcuts (G, A)
    useEffect(() => {
        if (!actionsRef) return;
        const generateFirst = () => {
            const firstWithout = actionableProspects.find(p => !(drafts[p.id] && drafts[p.id].length > 0) && !generating[p.id]);
            if (firstWithout) handleGenerate(firstWithout.id);
            else toast('All prospects already have drafts', 'info');
        };
        const nextProspect = () => setFocusedProspectIdx(i => Math.min(i + 1, actionableProspects.length - 1));
        const prevProspect = () => setFocusedProspectIdx(i => Math.max(i - 1, 0));
        const setDraftStep = (step) => {
            const p = actionableProspects[focusedProspectIdx];
            if (p) setActiveSteps(prev => ({ ...prev, [p.id]: step }));
        };
        const toggleInclude = () => {
            const p = actionableProspects[focusedProspectIdx];
            if (p) setInclusions(prev => ({ ...prev, [p.id]: !prev[p.id] }));
        };
        const openEnrollModal = () => { if (includedProspects.length > 0) setShowEnrollModal(true); };
        const openNoiseModal = () => setShowNoiseModal(true);
        actionsRef.current = { ...actionsRef.current, generateDrafts: generateFirst, approveAll: handleApproveAll, nextProspect, prevProspect, setDraftStep, toggleInclude, openEnrollModal, openNoiseModal };
        return () => { const c = { ...actionsRef.current }; delete c.generateDrafts; delete c.approveAll; delete c.nextProspect; delete c.prevProspect; delete c.setDraftStep; delete c.toggleInclude; delete c.openEnrollModal; delete c.openNoiseModal; actionsRef.current = c; };
    });

    return (
        <div className="bg-white rounded-lg border border-slate-200 p-3">
            <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-semibold text-slate-900 flex items-center gap-1.5">
                    <Icon name="mail" size={13} className="text-brand-600" />
                    Drafts
                    {allApproved && <span className="text-[0.625rem] bg-green-100 text-green-700 px-1.5 py-0.5 rounded-full">Approved</span>}
                </h3>
                <div className="flex items-center gap-2 text-[0.625rem] text-slate-400">
                    <Kbd>j</Kbd><Kbd>k</Kbd> <Kbd>1</Kbd><Kbd>2</Kbd><Kbd>3</Kbd> <Kbd>G</Kbd> <Kbd>A</Kbd>
                </div>
            </div>

            <div className="space-y-2">
                {actionableProspects.map((prospect, pIdx) => (
                    <div key={prospect.id}
                         className={`border rounded-md p-2.5 transition-all ${
                             pIdx === focusedProspectIdx ? 'ring-2 ring-blue-400 border-blue-300' : 'border-slate-100'
                         } ${!inclusions[prospect.id] ? 'opacity-50' : ''}`}>
                        <div className="flex items-center justify-between mb-2">
                            <div className="flex items-center gap-3 min-w-0">
                                <button
                                    onClick={() => setInclusions(prev => ({ ...prev, [prospect.id]: !prev[prospect.id] }))}
                                    className={`w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 transition ${
                                        inclusions[prospect.id]
                                            ? 'bg-emerald-500 border-emerald-500 text-white'
                                            : 'bg-white border-slate-300 text-transparent hover:border-slate-400'
                                    }`}
                                    title={`${inclusions[prospect.id] ? 'Exclude' : 'Include'} (S)`}>
                                    {inclusions[prospect.id] && <Icon name="check" size={12} />}
                                </button>
                                <div>
                                    <span className="text-sm font-medium text-slate-800">
                                        {prospect.full_name || `${prospect.first_name || ''} ${prospect.last_name || ''}`.trim()}
                                    </span>
                                    <span className="text-xs text-slate-500 ml-2">{prospect.title}</span>
                                    <span className="text-xs text-slate-400 ml-2">{prospect.email}</span>
                                </div>
                            </div>
                            <button onClick={() => handleGenerate(prospect.id)}
                                disabled={generating[prospect.id]}
                                className="px-3 py-1 text-xs font-medium text-brand-600 border border-brand-200 rounded-md hover:bg-brand-50 disabled:opacity-40 transition-all flex items-center gap-1.5">
                                {generating[prospect.id]
                                    ? <><Icon name="loader" size={12} /> Generating...</>
                                    : (drafts[prospect.id] || workspace.drafts.filter(d => d.prospect_id === prospect.id)).length > 0
                                        ? <><Icon name="refresh-cw" size={12} /> Regenerate All</>
                                        : <><Icon name="zap" size={12} /> Generate Drafts</>
                                }
                            </button>
                        </div>

                        {/* Draft step tabs (hidden when excluded) */}
                        {inclusions[prospect.id] && (() => {
                            const prospectDrafts = drafts[prospect.id] || workspace.drafts.filter(d => d.prospect_id === prospect.id);
                            if (!prospectDrafts || prospectDrafts.length === 0) return null;
                            const currentStep = activeSteps[prospect.id] || 1;
                            const activeDraft = prospectDrafts.find(d => (d.sequence_step || d.step_number) === currentStep) || prospectDrafts[0];
                            return (
                                <div className="mt-3 border-t border-slate-50 pt-3">
                                    {/* Step tabs */}
                                    <div className="flex gap-1 mb-2 border-b border-slate-100">
                                        {prospectDrafts.map((d, si) => {
                                            const step = d.sequence_step || d.step_number || si + 1;
                                            return (
                                                <button key={d.id || si}
                                                    onClick={() => setActiveSteps(prev => ({ ...prev, [prospect.id]: step }))}
                                                    className={`px-3 py-1.5 text-xs font-medium border-b-2 transition ${
                                                        currentStep === step
                                                            ? 'border-brand-500 text-brand-600'
                                                            : 'border-transparent text-slate-400 hover:text-slate-600'
                                                    }`}>
                                                    Step {step}
                                                    {d.status && d.status !== 'generated' && (
                                                        <span className="ml-1 w-1.5 h-1.5 rounded-full inline-block bg-brand-500" />
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {/* Active draft editor */}
                                    {activeDraft && (
                                        <>
                                            <div className="flex items-center justify-between mb-1.5">
                                                <span className={`text-[0.625rem] px-1.5 py-0.5 rounded-full font-medium ${
                                                    activeDraft.status === 'approved' ? 'bg-green-100 text-green-700' :
                                                    activeDraft.status === 'enrolled' ? 'bg-blue-100 text-blue-700' :
                                                    activeDraft.status === 'edited' ? 'bg-amber-100 text-amber-700' :
                                                    'bg-slate-100 text-slate-500'
                                                }`}>
                                                    {activeDraft.status || 'draft'}
                                                </span>
                                                {activeDraft.id && (
                                                    <button onClick={() => { setRegeneratingDraft(regeneratingDraft === activeDraft.id ? null : activeDraft.id); setCritique(''); }}
                                                        className="text-xs text-brand-600 hover:text-brand-700 flex items-center gap-1">
                                                        <Icon name="refresh-cw" size={12} /> Regenerate
                                                    </button>
                                                )}
                                            </div>
                                            {activeDraft.subject && (
                                                <input type="text" key={`subj-${activeDraft.id}-${activeDraft.updated_at || ''}`}
                                                    defaultValue={activeDraft.subject}
                                                    onBlur={e => { if (activeDraft.id && e.target.value !== activeDraft.subject) handleDraftEdit(activeDraft.id, 'subject', e.target.value); }}
                                                    className="w-full text-sm font-medium border border-slate-200 rounded-md px-3 py-1.5 mb-1.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500/20" />
                                            )}
                                            <AutoTextarea
                                                value={activeDraft.body || ''}
                                                onChange={e => {
                                                    setDrafts(prev => {
                                                        const updated = { ...prev };
                                                        for (const pid of Object.keys(updated)) {
                                                            updated[pid] = updated[pid].map(d =>
                                                                d.id === activeDraft.id ? { ...d, body: e.target.value } : d
                                                            );
                                                        }
                                                        return updated;
                                                    });
                                                }}
                                                onBlur={e => { if (activeDraft.id && e.target.value !== activeDraft.body) handleDraftEdit(activeDraft.id, 'body', e.target.value); }}
                                                className="text-slate-600"
                                                placeholder="Draft body will appear here..." />
                                            {regeneratingDraft === activeDraft.id && (
                                                <div className="mt-2 flex gap-2">
                                                    <input value={critique} onChange={e => setCritique(e.target.value)}
                                                        onKeyDown={e => e.key === 'Enter' && handleRegenerate(activeDraft.id)}
                                                        placeholder="What should change?"
                                                        className="flex-1 text-sm border border-slate-200 rounded-md px-3 py-1.5 focus:outline-none focus:border-brand-500" />
                                                    <button onClick={() => handleRegenerate(activeDraft.id)}
                                                        className="px-3 py-1.5 bg-brand-600 text-white text-xs rounded-md hover:bg-brand-700 transition-all">
                                                        Send
                                                    </button>
                                                </div>
                                            )}
                                        </>
                                    )}
                                </div>
                            );
                        })()}
                    </div>
                ))}
            </div>

            {Object.keys(drafts).length > 0 && !allApproved && (
                <button onClick={handleApproveAll}
                    disabled={approving}
                    className="mt-4 w-full px-4 py-2 bg-green-600 text-white text-sm font-medium rounded-md hover:bg-green-700 disabled:opacity-40 transition-all duration-150 flex items-center justify-center gap-2">
                    {approving ? <Icon name="loader" size={16} /> : <Icon name="check" size={16} />}
                    {approving ? 'Approving...' : <><span>Approve All Drafts</span> <Kbd>A</Kbd></>}
                </button>
            )}

            {/* Post-action: enrolled */}
            {postAction === 'enrolled' && (
                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-6 text-center">
                    <div className="text-3xl mb-2 text-emerald-600">&#10003;</div>
                    <h3 className="text-lg font-bold text-emerald-800 mb-1">
                        {includedProspects.length} contact{includedProspects.length !== 1 ? 's' : ''} enrolled
                    </h3>
                    <p className="text-sm text-emerald-600 mb-3">{workspace.account.company_name} — {workspace.campaign?.name || 'Campaign'}</p>
                    <div className="text-xs text-slate-500 space-y-0.5">
                        {includedProspects.map(p => (
                            <div key={p.id}>{p.full_name || p.email} ({p.email})</div>
                        ))}
                    </div>
                </div>
            )}

            {/* Post-action: noise */}
            {postAction === 'noise' && (
                <div className="mt-4 bg-slate-50 border border-slate-200 rounded-lg p-6 text-center">
                    <div className="text-3xl mb-2 text-slate-400">&#10005;</div>
                    <h3 className="text-lg font-bold text-slate-700 mb-1">
                        {workspace.account.company_name} marked as noise
                    </h3>
                    <p className="text-sm text-slate-500">All signals for this account have been archived.</p>
                </div>
            )}

            {/* Enroll confirmation modal */}
            {showEnrollModal && (
                <EnrollConfirmModal
                    prospects={includedProspects}
                    campaignName={workspace.campaign?.name || 'Campaign'}
                    onCancel={() => setShowEnrollModal(false)}
                    onConfirm={() => {
                        setShowEnrollModal(false);
                        setPostAction('enrolled');
                        // Trigger actual enrollment via the Enrollment component
                        if (actionsRef?.current?.enrollAll) actionsRef.current.enrollAll();
                    }}
                />
            )}

            {/* Noise confirmation modal */}
            {showNoiseModal && (
                <NoiseConfirmModal
                    companyName={workspace.account.company_name}
                    onCancel={() => setShowNoiseModal(false)}
                    onConfirm={() => {
                        setShowNoiseModal(false);
                        setPostAction('noise');
                    }}
                />
            )}
        </div>
    );
}

// Inline confirmation modals with auto-focus

function EnrollConfirmModal({ prospects, campaignName, onCancel, onConfirm }) {
    const confirmRef = useRef(null);
    useEffect(() => { confirmRef.current?.focus(); }, []);
    useEffect(() => {
        const handler = (e) => {
            if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
    }, [onCancel]);

    return (
        <div className="fixed inset-0 bg-black/30 flex items-center justify-center z-50">
            <div className="bg-white rounded-xl shadow-xl p-6 max-w-md w-full mx-4">
                <h3 className="text-lg font-bold text-slate-900 mb-3">Confirm Enrollment</h3>
                <p className="text-sm text-slate-600 mb-2">
                    <strong>{prospects.length}</strong> contact{prospects.length !== 1 ? 's' : ''} into <strong>{campaignName}</strong>:
                </p>
                <ul className="text-sm text-slate-700 list-disc ml-5 mb-4">
                    {prospects.map(p => (
                        <li key={p.id}>{p.full_name || p.email} — {p.email}</li>
                    ))}
                </ul>
                <div className="flex items-center gap-3">
                    <button ref={confirmRef} onClick={onConfirm}
                        className="flex-1 px-4 py-2.5 bg-emerald-600 text-white rounded-lg font-medium hover:bg-emerald-700 transition focus:ring-2 focus:ring-emerald-400 focus:outline-none flex items-center justify-center gap-2">
                        Enroll {prospects.length} <Kbd>Enter</Kbd>
                    </button>
                    <button onClick={onCancel}
                        className="px-4 py-2.5 text-slate-500 hover:text-slate-700 text-sm flex items-center gap-1">
                        Cancel <span className="text-slate-300 text-xs">Esc</span>
                    </button>
                </div>
            </div>
        </div>
    );
}
