// ═══════════════════════════════════════════════════════════════════════════
// SECTION 5 — ENROLLMENT
// ═══════════════════════════════════════════════════════════════════════════

function Enrollment({ workspace, onNextSignal, toast, actionsRef }) {
    const prospects = (workspace.prospects || []).filter(p => !p.do_not_contact);
    const [statuses, setStatuses] = useState({});
    const [errors, setErrors] = useState({});
    const [bulkResults, setBulkResults] = useState(null);
    const [enrollingAll, setEnrollingAll] = useState(false);
    const [allDone, setAllDone] = useState(false);
    const [sequenceId, setSequenceId] = useState(workspace.campaign?.sequence_id || '699a30753ab26800215fa07e');
    const [sequenceName, setSequenceName] = useState(workspace.campaign?.sequence_name || 'Template - 4 Email (Single Thread)');
    const [showSeqPicker, setShowSeqPicker] = useState(false);

    if (prospects.length === 0) return null;

    const handleEnroll = async (prospectId) => {
        setStatuses(prev => ({ ...prev, [prospectId]: 'enrolling' }));
        setErrors(prev => { const n = { ...prev }; delete n[prospectId]; return n; });
        try {
            await apiFetch('/v2/api/enrollment/enroll', {
                method: 'POST',
                body: JSON.stringify({ prospect_id: prospectId, sequence_id: sequenceId }),
            });
            setStatuses(prev => ({ ...prev, [prospectId]: 'enrolled' }));
            toast('Prospect enrolled');
            return 'enrolled';
        } catch (err) {
            setStatuses(prev => ({ ...prev, [prospectId]: 'failed' }));
            setErrors(prev => ({ ...prev, [prospectId]: err.message }));
            toast(err.message, 'error');
            return 'failed';
        }
    };

    const handleEnrollAll = async () => {
        setEnrollingAll(true);
        setBulkResults(null);
        const remaining = prospects.filter(p => statuses[p.id] !== 'enrolled');
        const ids = remaining.map(p => p.id);

        // Mark all as enrolling
        const enrollingMap = {};
        ids.forEach(id => { enrollingMap[id] = 'enrolling'; });
        setStatuses(prev => ({ ...prev, ...enrollingMap }));

        try {
            const resp = await apiFetch('/v2/api/enrollment/bulk', {
                method: 'POST',
                body: JSON.stringify({ prospect_ids: ids }),
            });

            // Apply per-prospect results
            const newStatuses = {};
            const newErrors = {};
            (resp.details || []).forEach(d => {
                newStatuses[d.prospect_id] = d.success ? 'enrolled' : 'failed';
                if (!d.success && d.error) newErrors[d.prospect_id] = d.error;
            });
            setStatuses(prev => ({ ...prev, ...newStatuses }));
            setErrors(prev => ({ ...prev, ...newErrors }));
            setBulkResults(resp);

            if ((resp.failed || 0) === 0 && (resp.skipped || 0) === 0) {
                setAllDone(true);
            }
        } catch (err) {
            // Network-level failure — mark all as failed
            const failMap = {};
            ids.forEach(id => { failMap[id] = 'failed'; });
            setStatuses(prev => ({ ...prev, ...failMap }));
            toast(err.message, 'error');
        } finally {
            setEnrollingAll(false);
        }
    };

    const enrolledCount = Object.values(statuses).filter(s => s === 'enrolled').length;

    // Register enroll action on actionsRef for keyboard shortcut (E)
    useEffect(() => {
        if (!actionsRef) return;
        actionsRef.current = { ...actionsRef.current, enrollAll: handleEnrollAll };
        return () => { const c = { ...actionsRef.current }; delete c.enrollAll; actionsRef.current = c; };
    });

    const statusIcon = (pid) => {
        const s = statuses[pid];
        if (s === 'enrolling') return <Icon name="loader" size={14} className="text-brand-600" />;
        if (s === 'enrolled') return <Icon name="check" size={14} className="text-green-600" />;
        if (s === 'failed') return <Icon name="x" size={14} className="text-red-500" />;
        return null;
    };

    const statusLabel = (pid) => {
        const s = statuses[pid];
        if (s === 'enrolling') return 'Enrolling...';
        if (s === 'enrolled') return 'Enrolled';
        if (s === 'failed') return errors[pid] || 'Failed';
        return 'Pending';
    };

    return (
        <div className="bg-white rounded-lg border border-slate-200 p-3">
            <h3 className="text-xs font-semibold text-slate-900 mb-2 flex items-center gap-1.5">
                <Icon name="send" size={13} className="text-brand-600" />
                Enrollment
                {enrolledCount > 0 && (
                    <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full ml-2">
                        {enrolledCount}/{prospects.length}
                    </span>
                )}
            </h3>

            {/* Sequence selector */}
            <div className="flex items-center gap-2 mb-2 text-xs">
                <span className="text-slate-500">Sequence:</span>
                <span className="font-medium text-slate-700">{sequenceName}</span>
                <button onClick={() => setShowSeqPicker(!showSeqPicker)}
                    className="text-brand-600 hover:text-brand-700 underline">
                    {showSeqPicker ? 'cancel' : 'change'}
                </button>
            </div>
            {showSeqPicker && (
                <div className="mb-2">
                    <input type="text" placeholder="Apollo Sequence ID"
                        className="text-xs border border-slate-200 rounded px-2 py-1 w-64 focus:outline-none focus:border-brand-500"
                        onKeyDown={e => {
                            if (e.key === 'Enter' && e.target.value.trim()) {
                                setSequenceId(e.target.value.trim());
                                setSequenceName('Custom Sequence');
                                setShowSeqPicker(false);
                                toast('Sequence overridden for this enrollment');
                            }
                        }} />
                    <span className="text-[0.625rem] text-slate-400 ml-2">Press Enter to apply</span>
                </div>
            )}

            {bulkResults && (bulkResults.failed > 0 || bulkResults.skipped > 0) && (
                <div className="mb-3 p-3 rounded-md bg-slate-50 border border-slate-200">
                    <div className="text-xs font-medium text-slate-700 mb-1">Enrollment Results</div>
                    <div className="flex gap-3 text-xs">
                        {bulkResults.enrolled > 0 && (
                            <span className="text-green-600">{bulkResults.enrolled} enrolled</span>
                        )}
                        {bulkResults.failed > 0 && (
                            <span className="text-red-500">{bulkResults.failed} failed</span>
                        )}
                        {bulkResults.skipped > 0 && (
                            <span className="text-amber-500">{bulkResults.skipped} skipped</span>
                        )}
                    </div>
                </div>
            )}

            <div className="space-y-2">
                {prospects.map(p => (
                    <div key={p.id}
                         className={`flex items-center justify-between py-2 px-3 rounded-md border transition-colors ${
                             statuses[p.id] === 'failed' ? 'border-red-200 bg-red-50/50' :
                             statuses[p.id] === 'enrolled' ? 'border-green-200 bg-green-50/50' :
                             'border-slate-100 hover:bg-slate-50'
                         }`}>
                        <div className="flex items-center gap-3 min-w-0">
                            {statusIcon(p.id)}
                            <div className="min-w-0">
                                <span className="text-sm font-medium text-slate-800 truncate block">
                                    {p.full_name || `${p.first_name || ''} ${p.last_name || ''}`.trim()}
                                </span>
                                <span className="text-xs text-slate-500">{p.title} {p.email ? `-- ${p.email}` : ''}</span>
                                {errors[p.id] && (
                                    <span className="text-xs text-red-500 block mt-0.5">{errors[p.id]}</span>
                                )}
                            </div>
                        </div>
                        <div className="flex items-center gap-2 flex-shrink-0">
                            <span className={`text-xs ${statuses[p.id] === 'enrolled' ? 'text-green-600' : statuses[p.id] === 'failed' ? 'text-red-500' : 'text-slate-400'}`}>
                                {statuses[p.id] === 'failed' ? 'Failed' : statusLabel(p.id)}
                            </span>
                            {statuses[p.id] !== 'enrolled' && statuses[p.id] !== 'enrolling' && (
                                <button onClick={() => handleEnroll(p.id)}
                                    className="px-3 py-1 text-xs font-medium text-brand-600 border border-brand-200 rounded-md hover:bg-brand-50 transition-all">
                                    {statuses[p.id] === 'failed' ? 'Retry' : 'Enroll'}
                                </button>
                            )}
                        </div>
                    </div>
                ))}
            </div>

            {!allDone && enrolledCount < prospects.length && (
                <button onClick={handleEnrollAll} disabled={enrollingAll}
                    className="mt-3 w-full px-4 py-2 bg-brand-600 text-white text-sm font-medium rounded-md hover:bg-brand-700 transition-all duration-150 flex items-center justify-center gap-2 disabled:opacity-50">
                    {enrollingAll ? (
                        <><Icon name="loader" size={16} /> Enrolling...</>
                    ) : (
                        <><Icon name="send" size={16} /> Enroll {prospects.length - enrolledCount} <Kbd>E</Kbd></>
                    )}
                </button>
            )}

            {allDone && (
                <div className="mt-4 text-center">
                    <div className="text-green-600 text-sm font-medium mb-2 flex items-center justify-center gap-1.5">
                        <Icon name="check" size={16} />
                        Enrollment complete ({enrolledCount}/{prospects.length} enrolled)
                    </div>
                    <button onClick={onNextSignal}
                        className="px-6 py-2 bg-brand-600 text-white text-sm font-medium rounded-md hover:bg-brand-700 transition-all inline-flex items-center gap-2">
                        Next Signal
                        <Icon name="chevron-right" size={14} />
                    </button>
                </div>
            )}
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// INTAKE PANEL — Add signals when queue is empty
// ═══════════════════════════════════════════════════════════════════════════

function IntakePanel({ onSignalsAdded, signalCount = 0 }) {
    const toast = useToast();
    const [activeTab, setActiveTab] = useState('csv');

    // CSV state
    const [csvFile, setCsvFile] = useState(null);
    const [csvUploading, setCsvUploading] = useState(false);
    const [csvResult, setCsvResult] = useState(null);
    const fileInputRef = useRef(null);

    // Manual state
    const [manualForm, setManualForm] = useState({ account_id: '', signal_description: '', signal_type: '', evidence_value: '' });
    const [manualSaving, setManualSaving] = useState(false);

    // Account search for manual entry
    const [accountSearch, setAccountSearch] = useState('');
    const [accountResults, setAccountResults] = useState([]);
    const [searchingAccounts, setSearchingAccounts] = useState(false);

    const searchAccounts = useCallback(async (q) => {
        if (!q || q.length < 2) { setAccountResults([]); return; }
        setSearchingAccounts(true);
        try {
            const resp = await fetch(`/api/accounts?q=${encodeURIComponent(q)}&limit=8`);
            const data = await resp.json();
            setAccountResults(data.accounts || data.results || []);
        } catch { setAccountResults([]); }
        finally { setSearchingAccounts(false); }
    }, []);

    useEffect(() => {
        const timer = setTimeout(() => searchAccounts(accountSearch), 300);
        return () => clearTimeout(timer);
    }, [accountSearch, searchAccounts]);

    // File upload (CSV, Excel, or DOCX)
    const handleFileUpload = async () => {
        if (!csvFile) return;
        setCsvUploading(true);
        setCsvResult(null);
        try {
            const formData = new FormData();
            formData.append('file', csvFile);
            const resp = await fetch('/v2/api/ingest/file', {
                method: 'POST',
                body: formData,
            });
            const data = await resp.json();
            if (!resp.ok || data.status === 'error') throw new Error(data.message || 'Upload failed');
            setCsvResult(data.result);
            // Handle Excel (multi-sheet) vs CSV/DOCX (flat) result shapes
            const created = data.result.totals
                ? data.result.totals.signals_created
                : data.result.signals_created;
            const sheetsInfo = data.result.sheets_processed
                ? ` across ${data.result.sheets_processed} sheet${data.result.sheets_processed > 1 ? 's' : ''}`
                : '';
            const enrichment = data.result.enrichment || (data.result.sheets?.[0]?.enrichment);
            const enrichParts = [];
            if (enrichment?.accounts_enriched) enrichParts.push(`${enrichment.accounts_enriched} enriched via Apollo`);
            if (enrichment?.signals_evaluated) enrichParts.push(`${enrichment.signals_evaluated} scored`);
            const enrichInfo = enrichParts.length ? ` (${enrichParts.join(', ')})` : '';
            if (created > 0) {
                toast(`Created ${created} signals${sheetsInfo}${enrichInfo}`);
                onSignalsAdded();
            } else {
                toast('No signals created — check results below', 'info');
            }
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setCsvUploading(false);
        }
    };

    // Manual entry
    const handleManualSubmit = async (e) => {
        e.preventDefault();
        if (!manualForm.account_id || !manualForm.signal_description) {
            toast('Account and description are required', 'error');
            return;
        }
        setManualSaving(true);
        try {
            await apiFetch('/v2/api/ingest/manual', {
                method: 'POST',
                body: JSON.stringify({
                    account_id: Number(manualForm.account_id),
                    signal_description: manualForm.signal_description,
                    signal_type: manualForm.signal_type || undefined,
                    evidence_value: manualForm.evidence_value || undefined,
                }),
            });
            toast('Signal created');
            setManualForm({ account_id: '', signal_description: '', signal_type: '', evidence_value: '' });
            setAccountSearch('');
            onSignalsAdded();
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setManualSaving(false);
        }
    };

    const tabs = [
        { key: 'csv', label: 'Upload File', icon: 'upload' },
        { key: 'manual', label: 'Add Manually', icon: 'edit' },
    ];

    return (
        <div className="flex-1 flex items-start justify-center bg-slate-50 p-8 overflow-y-auto v2-scrollbar">
            <div className="w-full max-w-2xl">
                <div className="text-center mb-8">
                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-100 mb-4">
                        <Icon name="zap" size={32} className="text-brand-600" />
                    </div>
                    <h2 className="text-2xl font-semibold text-slate-900 mb-2">{signalCount > 0 ? 'Import Signals' : 'Get Started'}</h2>
                    <p className="text-sm text-slate-500 max-w-md mx-auto">
                        {signalCount > 0
                            ? 'Upload a spreadsheet, document, or add a signal manually.'
                            : 'Your signal queue is empty. Upload a spreadsheet or document to get started, or add a signal manually.'}
                    </p>
                </div>

                {/* Tab bar */}
                <div className="flex gap-1 bg-slate-100 rounded-lg p-1 mb-6">
                    {tabs.map(tab => (
                        <button key={tab.key}
                            onClick={() => setActiveTab(tab.key)}
                            className={`flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-md text-sm font-medium transition-all
                                ${activeTab === tab.key ? 'bg-white text-brand-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                            <Icon name={tab.icon} size={16} />
                            {tab.label}
                        </button>
                    ))}
                </div>

                {/* File Upload */}
                {activeTab === 'csv' && (
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
                        <h3 className="text-base font-semibold text-slate-900 mb-2">Upload Signals</h3>
                        <p className="text-sm text-slate-500 mb-2">
                            Upload an Excel, CSV, or Word document. Structured files auto-detect columns. Unstructured documents are parsed by AI.
                        </p>
                        <p className="text-xs text-slate-400 mb-4">
                            After import, new accounts are enriched via Apollo (industry, size, revenue) and each signal is scored for outreach potential (1-5).
                        </p>
                        <div
                            onClick={() => fileInputRef.current?.click()}
                            onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('border-brand-400', 'bg-brand-50'); }}
                            onDragLeave={e => { e.currentTarget.classList.remove('border-brand-400', 'bg-brand-50'); }}
                            onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('border-brand-400', 'bg-brand-50'); const f = e.dataTransfer.files[0]; if (f && /\.(csv|xlsx|xls|docx|txt|pdf)$/i.test(f.name)) setCsvFile(f); else toast('Please drop a .csv, .xlsx, .docx, .txt, or .pdf file', 'error'); }}
                            className="border-2 border-dashed border-slate-200 rounded-lg p-8 text-center cursor-pointer hover:border-brand-400 hover:bg-brand-50/50 transition-all">
                            <Icon name="upload" size={32} className="text-slate-400 mx-auto mb-3" />
                            {csvFile ? (
                                <div>
                                    <p className="text-sm font-medium text-slate-700">{csvFile.name}</p>
                                    <p className="text-xs text-slate-400 mt-1">{(csvFile.size / 1024).toFixed(1)} KB — {csvFile.name.endsWith('.csv') ? 'CSV' : csvFile.name.endsWith('.docx') ? 'Word Document' : csvFile.name.endsWith('.txt') ? 'Text File' : csvFile.name.endsWith('.pdf') ? 'PDF Document' : 'Excel'}</p>
                                </div>
                            ) : (
                                <div>
                                    <p className="text-sm text-slate-600 font-medium">Drop a file here or click to browse</p>
                                    <p className="text-xs text-slate-400 mt-1">.xlsx, .csv, .docx, .txt, .pdf — max 10 MB</p>
                                </div>
                            )}
                            <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls,.docx,.txt,.pdf" className="hidden"
                                onChange={e => setCsvFile(e.target.files?.[0] || null)} />
                        </div>
                        {csvFile && (
                            <button onClick={handleFileUpload}
                                disabled={csvUploading}
                                className="mt-4 w-full px-4 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                                {csvUploading ? <><Icon name="loader" size={16} /> Processing...</> : <><Icon name="upload" size={16} /> Upload & Import</>}
                            </button>
                        )}
                        {csvResult && (() => {
                            const totals = csvResult.totals || csvResult;
                            const created = totals.signals_created || 0;
                            const sheets = csvResult.sheets || [];
                            const errors = totals.errors || csvResult.errors || [];
                            return (
                                <div className={`mt-4 rounded-lg p-4 ${created > 0 ? 'bg-green-50 border border-green-200' : 'bg-amber-50 border border-amber-200'}`}>
                                    <p className={`text-sm font-medium ${created > 0 ? 'text-green-800' : 'text-amber-800'}`}>
                                        {created} signals created, {totals.accounts_created || 0} new accounts, {totals.accounts_matched || 0} matched
                                        {totals.skipped > 0 && <span className="text-slate-500"> ({totals.skipped} empty rows skipped)</span>}
                                    </p>
                                    {(() => {
                                        const enrich = csvResult.enrichment || (sheets.length > 0 && sheets[0].enrichment);
                                        if (!enrich) return null;
                                        const parts = [];
                                        if (enrich.accounts_enriched > 0) parts.push(`${enrich.accounts_enriched} accounts enriched via Apollo`);
                                        if (enrich.signals_evaluated > 0) parts.push(`${enrich.signals_evaluated} signals scored`);
                                        if (!parts.length) return null;
                                        return <p className="text-xs text-green-600 mt-1">{parts.join(' · ')}</p>;
                                    })()}
                                    {sheets.length > 1 && (
                                        <div className="mt-2 space-y-1">
                                            {sheets.map((s, i) => (
                                                <p key={i} className="text-xs text-slate-600">
                                                    Sheet "{s.sheet_name}": {s.signals_created} signals
                                                </p>
                                            ))}
                                        </div>
                                    )}
                                    {errors.length > 0 && (
                                        <div className="mt-2 max-h-32 overflow-y-auto">
                                            {errors.slice(0, 20).map((err, i) => (
                                                <p key={i} className="text-xs text-red-600">{err}</p>
                                            ))}
                                            {errors.length > 20 && <p className="text-xs text-red-500 mt-1">... and {errors.length - 20} more errors</p>}
                                        </div>
                                    )}
                                </div>
                            );
                        })()}
                    </div>
                )}

                {/* Manual Entry */}
                {activeTab === 'manual' && (
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
                        <h3 className="text-base font-semibold text-slate-900 mb-2">Add Signal Manually</h3>
                        <p className="text-sm text-slate-500 mb-4">
                            Create a single intent signal for an existing account.
                        </p>
                        <form onSubmit={handleManualSubmit} className="space-y-4">
                            {/* Account search */}
                            <div>
                                <label className="block text-xs font-medium text-slate-700 mb-1">Account *</label>
                                <input type="text" value={accountSearch}
                                    onChange={e => { setAccountSearch(e.target.value); setManualForm(f => ({...f, account_id: ''})); }}
                                    placeholder="Search for an account..."
                                    className="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" />
                                {accountResults.length > 0 && !manualForm.account_id && (
                                    <div className="mt-1 border border-slate-200 rounded-md shadow-sm max-h-40 overflow-y-auto bg-white">
                                        {accountResults.map(a => (
                                            <button key={a.id} type="button"
                                                onClick={() => {
                                                    setManualForm(f => ({...f, account_id: String(a.id)}));
                                                    setAccountSearch(a.company_name || a.name || `Account #${a.id}`);
                                                    setAccountResults([]);
                                                }}
                                                className="w-full text-left px-3 py-2 text-sm hover:bg-slate-50 border-b border-slate-100 last:border-0">
                                                {a.company_name || a.name || `Account #${a.id}`}
                                                {a.website && <span className="text-xs text-slate-400 ml-2">{a.website}</span>}
                                            </button>
                                        ))}
                                    </div>
                                )}
                                {manualForm.account_id && (
                                    <p className="text-xs text-green-600 mt-1">Selected: Account #{manualForm.account_id}</p>
                                )}
                            </div>

                            {/* Signal description */}
                            <div>
                                <label className="block text-xs font-medium text-slate-700 mb-1">Signal Description *</label>
                                <textarea value={manualForm.signal_description}
                                    onChange={e => setManualForm(f => ({...f, signal_description: e.target.value}))}
                                    placeholder="Describe the intent signal..."
                                    rows={3}
                                    className="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent resize-none" />
                            </div>

                            {/* Signal type */}
                            <div>
                                <label className="block text-xs font-medium text-slate-700 mb-1">Signal Type</label>
                                <select value={manualForm.signal_type}
                                    onChange={e => setManualForm(f => ({...f, signal_type: e.target.value}))}
                                    className="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                                    <option value="">Select type (optional)</option>
                                    {Object.entries(SIGNAL_LABELS).map(([key, label]) => (
                                        <option key={key} value={key}>{label}</option>
                                    ))}
                                </select>
                            </div>

                            {/* Evidence */}
                            <div>
                                <label className="block text-xs font-medium text-slate-700 mb-1">Evidence</label>
                                <input type="text" value={manualForm.evidence_value}
                                    onChange={e => setManualForm(f => ({...f, evidence_value: e.target.value}))}
                                    placeholder="URL or evidence (optional)"
                                    className="w-full border border-slate-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent" />
                            </div>

                            <button type="submit" disabled={manualSaving || !manualForm.account_id || !manualForm.signal_description}
                                className="w-full px-4 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                                {manualSaving ? <><Icon name="loader" size={16} /> Creating...</> : <><Icon name="plus" size={16} /> Create Signal</>}
                            </button>
                        </form>
                    </div>
                )}
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// RIGHT PANEL — WORKSPACE
// ═══════════════════════════════════════════════════════════════════════════

function Workspace({ signalId, signalIndex, totalSignals, onMarkNoise, onSkip, onNextSignal, onReloadAndAdvance, onSignalsAdded, actionsRef }) {
    const toast = useToast();
    const [workspace, setWorkspace] = useState(null);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState(null);

    const loadWorkspace = useCallback(async () => {
        if (!signalId) return;
        setLoading(true);
        setError(null);
        try {
            const data = await apiFetch(`/v2/api/signals/${signalId}`);
            setWorkspace(data);
        } catch (err) {
            setError(err.message);
        } finally {
            setLoading(false);
        }
    }, [signalId]);

    useEffect(() => {
        loadWorkspace();
    }, [loadWorkspace]);

    if (!signalId) {
        // If queue is truly empty, show intake panel instead of "select a signal"
        if (totalSignals === 0 && onSignalsAdded) {
            return <IntakePanel onSignalsAdded={onSignalsAdded} />;
        }
        return (
            <div className="flex-1 flex items-center justify-center bg-slate-50">
                <div className="text-center">
                    <Icon name="zap" size={48} className="text-slate-300 mx-auto mb-4" />
                    <p className="text-lg text-slate-400 font-medium">Select a signal from the queue to begin</p>
                    <p className="text-sm text-slate-300 mt-1">Use arrow keys to navigate, Enter to select</p>
                </div>
            </div>
        );
    }

    if (loading) {
        return (
            <div className="flex-1 overflow-y-auto v2-scrollbar bg-slate-50">
                <WorkspaceSkeleton />
            </div>
        );
    }

    if (error) {
        return (
            <div className="flex-1 flex items-center justify-center bg-slate-50">
                <div className="text-center">
                    <p className="text-red-500 text-sm mb-2">{error}</p>
                    <button onClick={loadWorkspace}
                        className="px-4 py-2 text-sm text-brand-600 border border-brand-200 rounded-md hover:bg-brand-50">
                        Retry
                    </button>
                </div>
            </div>
        );
    }

    if (!workspace) return null;

    return (
        <div className="flex-1 flex flex-col bg-slate-50 min-h-0">
            {/* Main scrollable content — compact spacing */}
            <div className="flex-1 overflow-y-auto v2-scrollbar px-4 py-3 pb-16 space-y-2">
                {/* Signal + Campaign header */}
                <SignalHeader workspace={workspace} onCampaignUpdate={loadWorkspace} toast={toast} />

                {/* Persona Search */}
                <PersonaSearch workspace={workspace} onProspectsSaved={loadWorkspace} toast={toast} actionsRef={actionsRef} />

                {/* Draft Review (visible if prospects exist) */}
                {workspace.prospects && workspace.prospects.length > 0 && (
                    <DraftReview key={workspace.signal.id} workspace={workspace} toast={toast} actionsRef={actionsRef} />
                )}

                {/* Enrollment (visible if prospects exist) */}
                {workspace.prospects && workspace.prospects.length > 0 && (
                    <Enrollment key={workspace.signal.id} workspace={workspace} onNextSignal={onReloadAndAdvance || onNextSignal} toast={toast} actionsRef={actionsRef} />
                )}
            </div>

            {/* Bottom bar */}
            <div className="v2-bottom-bar border-t border-slate-200 bg-white px-6 py-2.5 flex items-center justify-between flex-shrink-0">
                <div className="flex items-center gap-4">
                    <span className="text-xs text-slate-500">
                        Signal {signalIndex + 1} of {totalSignals}
                    </span>
                    <span className="text-[0.625rem] text-slate-300 hidden sm:inline flex items-center gap-1.5">
                        <Kbd>j</Kbd><Kbd>k</Kbd> navigate
                        <span className="text-slate-200 mx-1">&bull;</span>
                        <Kbd>s</Kbd> skip
                        <span className="text-slate-200 mx-1">&bull;</span>
                        <Kbd>1</Kbd><Kbd>2</Kbd><Kbd>3</Kbd> steps
                        <span className="text-slate-200 mx-1">&bull;</span>
                        <Kbd>?</Kbd> help
                    </span>
                </div>
                <div className="flex items-center gap-2">
                    <button onClick={onMarkNoise}
                        className="px-3 py-1.5 text-xs font-medium text-slate-500 border border-slate-200 rounded-md hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-all flex items-center gap-1.5">
                        Noise <Kbd>n</Kbd>
                    </button>
                    <button onClick={onSkip}
                        className="px-3 py-1.5 text-xs font-medium text-slate-500 border border-slate-200 rounded-md hover:bg-slate-50 transition-all flex items-center gap-1.5">
                        Skip <Kbd>s</Kbd>
                    </button>
                </div>
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════

function App() {
    const toast = useToast();

    // Signal queue state
    const [signals, setSignals] = useState([]);
    const [total, setTotal] = useState(0);
    const [loading, setLoading] = useState(true);
    const [statusFilter, setStatusFilter] = useState('new');
    const [ownerFilter, setOwnerFilter] = useState(null);
    const [owners, setOwners] = useState([]);
    const [counts, setCounts] = useState({});
    const [activeSignalId, setActiveSignalId] = useState(null);
    const [activeIndex, setActiveIndex] = useState(-1);
    const [showIntake, setShowIntake] = useState(false);
    const [showHelp, setShowHelp] = useState(false);
    const [searchTerm, setSearchTerm] = useState('');

    // Ref for workspace child components to register their keyboard-triggered actions
    const workspaceActionsRef = useRef({});

    // Load signals (also refreshes counts so they stay in sync after any action)
    const loadSignals = useCallback(async () => {
        setLoading(true);
        try {
            const params = new URLSearchParams();
            if (statusFilter) params.set('status', statusFilter);
            if (ownerFilter) params.set('owner', ownerFilter);
            params.set('limit', '500');

            const data = await apiFetch(`/v2/api/signals?${params}`);
            const fresh = data.signals || [];
            setSignals(fresh);
            setTotal(data.total || 0);

            // Refresh counts every time signals are loaded so sidebar stays truthful
            apiFetch('/v2/api/signals/counts')
                .then(c => setCounts(c.counts || {}))
                .catch(() => {});

            return fresh;
        } catch (err) {
            if (toast) toast(err.message, 'error');
            return null;
        } finally {
            setLoading(false);
        }
    }, [statusFilter, ownerFilter]);

    // Load owners + counts on mount
    useEffect(() => {
        apiFetch('/v2/api/signals/owners')
            .then(data => setOwners(data.owners || []))
            .catch(() => {});
        apiFetch('/v2/api/signals/counts')
            .then(data => setCounts(data.counts || {}))
            .catch(() => {});
    }, []);

    // Reset position and reload when filter changes
    useEffect(() => {
        setActiveSignalId(null);
        setActiveIndex(-1);
        loadSignals();
    }, [loadSignals]);

    // Select signal
    const selectSignal = useCallback((id) => {
        setActiveSignalId(id);
        const idx = signals.findIndex(s => s.id === id);
        setActiveIndex(idx);
    }, [signals]);

    // Navigate to next signal
    const nextSignal = useCallback(() => {
        const nextIdx = activeIndex + 1;
        if (nextIdx < signals.length) {
            selectSignal(signals[nextIdx].id);
        } else {
            // Refresh the queue
            loadSignals();
            setActiveSignalId(null);
            setActiveIndex(-1);
        }
    }, [activeIndex, signals, selectSignal, loadSignals]);

    // Skip = same as next
    const skipSignal = useCallback(() => {
        nextSignal();
    }, [nextSignal]);

    // Reload queue and select next signal from FRESH data.
    // Used after any action that changes queue membership (noise, enrollment, etc).
    // Sets both activeSignalId and activeIndex directly from the fresh array
    // to avoid the stale-closure bug where selectSignal searches the old signals array.
    const reloadAndAdvance = useCallback(async () => {
        const prevIdx = activeIndex;
        const fresh = await loadSignals();
        if (fresh && fresh.length > 0) {
            const nextIdx = Math.min(Math.max(prevIdx, 0), fresh.length - 1);
            setActiveSignalId(fresh[nextIdx].id);
            setActiveIndex(nextIdx);
        } else {
            setActiveSignalId(null);
            setActiveIndex(-1);
        }
    }, [activeIndex, loadSignals]);

    // Mark as noise (with confirmation — cascades to ALL signals for this account)
    const markNoise = useCallback(async () => {
        if (!activeSignalId) return;
        const sig = signals.find(s => s.id === activeSignalId);
        if (!sig) return;

        const company = sig.company_name || 'this account';
        if (!window.confirm(`Mark "${company}" as noise?\n\nThis will archive ALL signals for this account.`)) return;

        try {
            await apiFetch(`/v2/api/accounts/${sig.account_id}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'noise' }),
            });
            toast(`"${company}" marked as noise`);
            await reloadAndAdvance();
        } catch (err) {
            toast(err.message, 'error');
        }
    }, [activeSignalId, signals, reloadAndAdvance, toast]);

    // Highlight first signal in list on initial load (but don not open the workspace)
    useEffect(() => {
        if (!loading && signals.length > 0 && activeIndex === -1) {
            setActiveIndex(0);
        }
    }, [loading, signals]);

    // Keyboard navigation + workflow shortcuts
    useEffect(() => {
        const handler = (e) => {
            // Always allow ? for help toggle, even if help is showing
            if (e.key === '?') {
                e.preventDefault();
                setShowHelp(prev => !prev);
                return;
            }

            // When in form fields, only Escape works (blurs the field)
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                if (e.key === 'Escape') {
                    e.target.blur();
                    e.preventDefault();
                }
                return;
            }

            // Skip shortcuts when help modal is open
            if (showHelp) return;

            const key = e.key;

            // --- Queue navigation ---
            if (key === 'ArrowDown') {
                e.preventDefault();
                const nextIdx = Math.min(activeIndex + 1, signals.length - 1);
                if (signals[nextIdx]) selectSignal(signals[nextIdx].id);
            } else if (key === 'ArrowUp') {
                e.preventDefault();
                const prevIdx = Math.max(activeIndex - 1, 0);
                if (signals[prevIdx]) selectSignal(signals[prevIdx].id);
            } else if (key === 'Enter' && activeIndex >= 0) {
                e.preventDefault();
                selectSignal(signals[activeIndex].id);
            } else if (key === 'Escape') {
                if (showIntake) {
                    setShowIntake(false);
                } else if (activeSignalId) {
                    // Back to table
                    setActiveSignalId(null);
                    setActiveIndex(-1);
                }
            }

            // --- Signal actions (only when a signal is selected) ---
            else if (key === 'n' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.openNoiseModal;
                if (action) action();
                else markNoise();
            } else if (key === 's' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.toggleInclude;
                if (action) action();
                else skipSignal();
            } else if (key === 'Enter' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.openEnrollModal;
                if (action) action();
            }

            // --- Panels ---
            else if (key === 'i') {
                e.preventDefault();
                setShowIntake(prev => !prev);
            }

            // --- Workflow shortcuts (delegated to workspace child components) ---
            else if (key === 'f' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.search;
                if (action) action();
            } else if (key === 'g' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.generateDrafts;
                if (action) action();
            } else if (key === 'a' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.approveAll;
                if (action) action();
            } else if (key === 'e' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.enrollAll;
                if (action) action();
            }

            // --- Prospect navigation (j/k) and draft step tabs (1/2/3) ---
            else if (key === 'j' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.nextProspect;
                if (action) action();
            } else if (key === 'k' && activeSignalId && !showIntake) {
                e.preventDefault();
                const action = workspaceActionsRef.current.prevProspect;
                if (action) action();
            } else if ((key === '1' || key === '2' || key === '3') && activeSignalId && !showIntake) {
                // Draft step tabs — only in workspace view
                e.preventDefault();
                const action = workspaceActionsRef.current.setDraftStep;
                if (action) action(Number(key));
            } else if (key === '/') {
                // Focus search box
                e.preventDefault();
                const searchInput = document.querySelector('input[placeholder="Search..."]');
                if (searchInput) searchInput.focus();
            }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
    }, [activeIndex, signals, selectSignal, activeSignalId, showIntake, showHelp, markNoise, skipSignal]);

    const goBackToTable = useCallback(() => {
        setActiveSignalId(null);
        setActiveIndex(-1);
        setShowIntake(false);
    }, []);

    return (
        <div className="flex flex-col h-screen overflow-hidden">
            <TopBar
                statusFilter={statusFilter}
                onStatusFilter={setStatusFilter}
                counts={counts}
                searchTerm={searchTerm}
                onSearchChange={setSearchTerm}
                ownerFilter={ownerFilter}
                onOwnerFilter={setOwnerFilter}
                owners={owners}
                total={total}
                onAddSignals={() => { setActiveSignalId(null); setActiveIndex(-1); setShowIntake(true); }}
                onShowHelp={() => setShowHelp(true)}
                onBack={goBackToTable}
                showBack={!!activeSignalId}
            />
            {showIntake ? (
                <IntakePanel signalCount={signals.length} onSignalsAdded={async () => { setShowIntake(false); const fresh = await loadSignals(); if (fresh && fresh.length > 0) { setActiveSignalId(fresh[0].id); setActiveIndex(0); } }} />
            ) : activeSignalId ? (
                <Workspace
                    signalId={activeSignalId}
                    signalIndex={activeIndex >= 0 ? activeIndex : 0}
                    totalSignals={total}
                    onMarkNoise={markNoise}
                    onSkip={skipSignal}
                    onNextSignal={nextSignal}
                    onReloadAndAdvance={reloadAndAdvance}
                    onSignalsAdded={async () => { const fresh = await loadSignals(); if (fresh && fresh.length > 0 && !activeSignalId) { setActiveSignalId(fresh[0].id); setActiveIndex(0); } }}
                    actionsRef={workspaceActionsRef}
                />
            ) : (
                <SignalTable
                    signals={signals}
                    loading={loading}
                    activeIndex={activeIndex}
                    onSelect={(id) => { setShowIntake(false); selectSignal(id); }}
                    searchTerm={searchTerm}
                />
            )}
            {showHelp && <KeyboardHelp onClose={() => setShowHelp(false)} />}
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════════════════

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
    <ToastProvider>
        <App />
    </ToastProvider>
);
</script>
