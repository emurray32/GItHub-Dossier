// SECTION 3 — PERSONA SEARCH
// ═══════════════════════════════════════════════════════════════════════════

function PersonaSearch({ workspace, onProspectsSaved, toast, actionsRef }) {
    // Build persona tiers from campaign personas — one chip per tier,
    // but each tier carries ALL its titles for the Apollo search
    const defaultPersonas = useMemo(() => {
        if (workspace.personas && workspace.personas.length > 0) {
            const tiers = [];
            for (const p of workspace.personas) {
                let titles = [];
                let seniorities = [];
                try { titles = typeof p.titles_json === 'string' ? JSON.parse(p.titles_json) : (p.titles_json || []); } catch { titles = []; }
                try { seniorities = typeof p.seniorities_json === 'string' ? JSON.parse(p.seniorities_json) : (p.seniorities_json || []); } catch { seniorities = []; }
                if (titles.length === 0) continue;
                tiers.push({
                    title: titles[0],              // Display: first title
                    allTitles: titles,              // Search: all titles in this tier
                    seniority: seniorities[0] || '',
                    allSeniorities: seniorities,    // Search: all seniority levels
                    tierName: p.persona_name || titles[0],
                });
            }
            if (tiers.length > 0) return tiers;
        }
        return [
            { title: 'VP Engineering', allTitles: ['VP Engineering', 'VP of Engineering', 'Head of Engineering', 'CTO', 'Director of Engineering'], seniority: 'vp', allSeniorities: ['vp', 'director', 'c_suite'], tierName: 'Engineering Leader' },
            { title: 'Localization Manager', allTitles: ['Localization Manager', 'Head of Localization', 'Director of Localization', 'Globalization Manager'], seniority: 'manager', allSeniorities: ['manager', 'director', 'vp'], tierName: 'Localization Leader' },
            { title: 'Head of Product', allTitles: ['Head of Product', 'VP Product', 'Director of Product', 'Director of Product Management'], seniority: 'vp', allSeniorities: ['vp', 'director'], tierName: 'Product Leader' },
        ];
    }, [workspace.signal.id]);

    const [personas, setPersonas] = useState(defaultPersonas);
    const [newTitle, setNewTitle] = useState('');
    const [newSeniority, setNewSeniority] = useState('');
    const [searching, setSearching] = useState(false);
    const [results, setResults] = useState([]);

    useEffect(() => {
        setPersonas(defaultPersonas);
        setResults([]);
    }, [workspace.signal.id]);

    const addPersona = () => {
        if (!newTitle.trim()) return;
        setPersonas(prev => [...prev, { title: newTitle.trim(), seniority: newSeniority || '' }]);
        setNewTitle('');
        setNewSeniority('');
    };

    const removePersona = (idx) => {
        setPersonas(prev => prev.filter((_, i) => i !== idx));
    };

    const handleSearch = async () => {
        if (personas.length === 0) {
            toast('Add at least one persona to search', 'error');
            return;
        }
        setSearching(true);
        setResults([]);
        try {
            // Send full persona tiers with allTitles and allSeniorities
            const searchPersonas = personas.map(p => ({
                title: p.title,
                allTitles: p.allTitles || [p.title],
                seniority: p.seniority || '',
                allSeniorities: p.allSeniorities || (p.seniority ? [p.seniority] : []),
            }));
            // Search + auto-save in one API call (backend handles enrichment + saving)
            const data = await apiFetch(`/v2/api/signals/${workspace.signal.id}/search`, {
                method: 'POST',
                body: JSON.stringify({ personas: searchPersonas, max_results: 3 }),
            });
            const people = data.people || [];
            const savedCount = data.saved_count || 0;
            setResults(people);
            if (people.length === 0) {
                const candidates = data.candidates_found || 0;
                const unverified = data.unverified_count || 0;
                if (candidates === 0) {
                    toast('Company not found in Apollo — no candidates at this domain', 'info');
                } else if (unverified > 0) {
                    toast(`Found ${candidates} candidates but ${unverified} had unverified emails. Showing likely-status contacts.`, 'info');
                } else {
                    toast(`No contacts found (${candidates} candidates checked)`, 'info');
                }
            } else {
                const foundCount = people.length;
                const unverifiedCount = people.filter(p => !p.email_verified).length;
                let msg = '';
                if (savedCount === 0) {
                    msg = `Found ${foundCount} contact${foundCount !== 1 ? 's' : ''} already in the workspace`;
                } else if (savedCount === foundCount) {
                    msg = `Found & saved ${savedCount} contact${savedCount !== 1 ? 's' : ''}`;
                } else {
                    msg = `Found ${foundCount} contact${foundCount !== 1 ? 's' : ''} and saved ${savedCount} new`;
                }
                msg += (unverifiedCount > 0 ? ` (${unverifiedCount} unverified)` : '');
                msg += ' — ready for drafts';
                toast(msg);
                // Auto-refresh workspace to show saved prospects in draft section
                if (onProspectsSaved) await onProspectsSaved();
            }
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSearching(false);
        }
    };

    // Register search action on actionsRef for keyboard shortcut (F)
    useEffect(() => {
        if (!actionsRef) return;
        actionsRef.current = { ...actionsRef.current, search: handleSearch };
        return () => { const c = { ...actionsRef.current }; delete c.search; actionsRef.current = c; };
    });

    return (
        <div className="bg-white rounded-lg border border-slate-200 p-3">
            {/* Persona pills row + search button */}
            <div className="flex flex-wrap items-center gap-1.5">
                {personas.map((p, i) => (
                    <div key={i} className="v2-chip" title={p.allTitles ? p.allTitles.join(', ') : p.title}>
                        {p.tierName || p.title}
                        {p.seniority && <span className="text-[0.625rem] text-indigo-400 ml-0.5">({p.seniority})</span>}
                        <button onClick={() => removePersona(i)} title="Remove">x</button>
                    </div>
                ))}
                <button onClick={handleSearch}
                    disabled={searching || personas.length === 0}
                    className="ml-auto px-3 py-1 bg-brand-600 text-white text-xs font-medium rounded hover:bg-brand-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all flex items-center gap-1.5">
                    {searching ? <Icon name="loader" size={12} /> : <Icon name="search" size={12} />}
                    {searching ? 'Searching...' : 'Search Apollo'}
                    {!searching && <Kbd>F</Kbd>}
                </button>
            </div>
            {/* Add custom persona — below pills */}
            <div className="flex items-center gap-1 mt-1.5">
                <input value={newTitle} onChange={e => setNewTitle(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addPersona()}
                    placeholder="+ Add title"
                    className="text-xs border border-slate-200 rounded px-2 py-1 w-28 focus:outline-none focus:border-brand-500" />
                <select value={newSeniority} onChange={e => setNewSeniority(e.target.value)}
                    className="text-xs border border-slate-200 rounded px-1.5 py-1 focus:outline-none focus:border-brand-500 bg-white w-20">
                    <option value="">Level</option>
                    <option value="c_suite">C-Suite</option>
                    <option value="vp">VP</option>
                    <option value="director">Dir</option>
                    <option value="manager">Mgr</option>
                    <option value="senior">Sr</option>
                </select>
                <button onClick={addPersona} className="px-1.5 py-1 border border-slate-200 rounded text-slate-500 hover:bg-slate-50">
                    <Icon name="plus" size={12} />
                </button>
            </div>

            {/* Contacts are auto-saved by search — table removed, prospects shown as rows in DraftReview */}
        </div>
    );
}

// ═══════════════════════════════════════════════════════════════════════════
// SECTION 4 — DRAFT REVIEW
// ═══════════════════════════════════════════════════════════════════════════

function DraftReview({ workspace, toast, actionsRef, onAllApproved }) {
    const prospects = workspace.prospects || [];
    const serverApprovedProspectIds = workspace.approved_prospect_ids || [];
    const serverApprovedKey = serverApprovedProspectIds.join(',');
    const [drafts, setDrafts] = useState(() => {
        // Initialize from workspace.drafts so server-loaded drafts are editable
        const init = {};
        for (const d of (workspace.drafts || [])) {
            const pid = d.prospect_id;
            if (!init[pid]) init[pid] = [];
            init[pid].push(d);
        }
        return init;
    });
    useEffect(() => {
        if (!workspace.drafts || workspace.drafts.length === 0) return;
        const grouped = {};
        workspace.drafts.forEach(d => {
            const pid = d.prospect_id;
            if (!grouped[pid]) grouped[pid] = [];
            grouped[pid].push(d);
        });
        setDrafts(prev => {
            // Only update if server has drafts we don't have locally
            const hasNew = Object.keys(grouped).some(pid => !prev[pid] || prev[pid].length === 0);
            return hasNew ? { ...prev, ...grouped } : prev;
        });
    }, [workspace.drafts]);
    const [generating, setGenerating] = useState({});
    const [regeneratingDraft, setRegeneratingDraft] = useState(null);
    const [critique, setCritique] = useState('');
    const [approving, setApproving] = useState(false);
    const [allApproved, setAllApproved] = useState(false);
    const [approvedProspects, setApprovedProspects] = useState(() => new Set(serverApprovedProspectIds));
    const [focusedProspectIdx, setFocusedProspectIdx] = useState(0);
    const [activeSteps, setActiveSteps] = useState({});
    const [inclusions, setInclusions] = useState(() => {
        const init = {};
        prospects.forEach(p => { if (!p.do_not_contact) init[p.id] = true; });
        return init;
    });
    const [showEnrollModal, setShowEnrollModal] = useState(false);
    const [showNoiseModal, setShowNoiseModal] = useState(false);
    const [postAction, setPostAction] = useState(null); // 'enrolled' | 'noise' | null

    const actionableProspects = prospects.filter(p => !p.do_not_contact);
    const actionableProspectIds = actionableProspects.map(p => p.id);
    const actionableProspectKey = actionableProspectIds.join(',');
    const prospectDraftsAreApproved = (prospectDrafts) =>
        Boolean(prospectDrafts && prospectDrafts.length)
        && prospectDrafts.every(d => ['approved', 'enrolled'].includes(d.status));
    const derivedApprovedProspectIds = new Set(serverApprovedProspectIds);
    actionableProspects.forEach(p => {
        const prospectDrafts = drafts[p.id] || workspace.drafts.filter(d => d.prospect_id === p.id);
        if (prospectDraftsAreApproved(prospectDrafts)) derivedApprovedProspectIds.add(p.id);
    });
    const derivedApprovedKey = [...derivedApprovedProspectIds].sort((a, b) => a - b).join(',');

    useEffect(() => {
        const nextApproved = new Set(derivedApprovedProspectIds);
        setApprovedProspects(prev => {
            if (prev.size === nextApproved.size && [...prev].every(id => nextApproved.has(id))) {
                return prev;
            }
            return nextApproved;
        });

        const everyoneApproved = actionableProspects.length > 0
            && actionableProspects.every(p => nextApproved.has(p.id));
        setAllApproved(everyoneApproved);
        setFocusedProspectIdx(prev => {
            if (actionableProspects.length === 0) return 0;
            if (everyoneApproved) return Math.min(prev, actionableProspects.length - 1);

            const current = actionableProspects[prev];
            if (current && !nextApproved.has(current.id)) return prev;

            const firstPendingIdx = actionableProspects.findIndex(p => !nextApproved.has(p.id));
            return firstPendingIdx >= 0 ? firstPendingIdx : 0;
        });
        if (everyoneApproved && onAllApproved) onAllApproved();
    }, [derivedApprovedKey, serverApprovedKey, actionableProspectKey, onAllApproved]);

    // Track per-prospect sequence overrides
    const [prospectSequences, setProspectSequences] = useState(() => {
        const initial = {};
        actionableProspects.forEach(p => {
            if (p.sequence_config_override) {
                try {
                    const cfg = typeof p.sequence_config_override === 'string'
                        ? JSON.parse(p.sequence_config_override)
                        : p.sequence_config_override;
                    if (cfg.sequence_id) initial[p.id] = cfg.sequence_id;
                } catch {}
            }
        });
        return initial;
    });

    const handleSequenceChange = async (prospectId, sequenceId) => {
        const seq = (workspace.sequences || []).find(s => s.sequence_id === sequenceId);
        if (!seq) return;

        let seqConfig;
        try {
            seqConfig = typeof seq.sequence_config === 'string' ? JSON.parse(seq.sequence_config) : seq.sequence_config;
        } catch {
            seqConfig = {};
        }

        const config = {
            sequence_id: seq.sequence_id,
            sequence_name: seq.sequence_name,
            num_steps: seq.num_steps || seqConfig?.num_steps || 4,
            single_thread: seqConfig?.single_thread || false,
        };

        // Update local state immediately
        setProspectSequences(prev => ({ ...prev, [prospectId]: sequenceId }));

        try {
            await apiFetch(`/v2/api/prospects/${prospectId}/sequence`, {
                method: 'PUT',
                body: JSON.stringify({
                    sequence_config: config,
                    regenerate: true,
                    signal_id: workspace.signal.id,
                    campaign_id: workspace.campaign?.id || 0,
                }),
            });

            // Reload workspace to get new drafts
            const refreshed = await apiFetch(`/v2/api/signals/${workspace.signal.id}`);
            if (refreshed.drafts) {
                const grouped = {};
                refreshed.drafts.forEach(d => {
                    const pid = d.prospect_id;
                    if (!grouped[pid]) grouped[pid] = [];
                    grouped[pid].push(d);
                });
                setDrafts(prev => ({ ...prev, ...grouped }));
            }

            toast(`Drafts regenerated for ${seq.sequence_name.replace('Template - ', '')}`);
        } catch (err) {
            toast(`Failed to change sequence: ${err.message}`, 'error');
            // Revert local state
            setProspectSequences(prev => {
                const next = { ...prev };
                delete next[prospectId];
                return next;
            });
        }
    };
    const includedProspects = actionableProspects.filter(p => inclusions[p.id]);

    if (actionableProspects.length === 0) return null;

    const handleGenerate = async (prospectId) => {
        setGenerating(prev => ({ ...prev, [prospectId]: true }));
        try {
            const data = await apiFetch('/v2/api/drafts/generate', {
                method: 'POST',
                body: JSON.stringify({
                    prospect_id: prospectId,
                    signal_id: workspace.signal.id,
                    campaign_id: workspace.signal.recommended_campaign_id || 0,
                }),
            });
            setDrafts(prev => ({ ...prev, [prospectId]: data.drafts || [] }));
            if (data.message) toast(data.message, 'info');
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setGenerating(prev => ({ ...prev, [prospectId]: false }));
        }
    };

    const handleDraftEdit = async (draftId, field, value) => {
        try {
            const payload = {};
            payload[field] = value;
            const data = await apiFetch(`/v2/api/drafts/${draftId}`, {
                method: 'PUT',
                body: JSON.stringify(payload),
            });
            // Update local draft state
            setDrafts(prev => {
                const updated = { ...prev };
                for (const pid of Object.keys(updated)) {
                    updated[pid] = updated[pid].map(d =>
                        d.id === draftId ? { ...d, ...payload, status: data.draft?.status || d.status } : d
                    );
                }
                return updated;
            });
        } catch (err) {
            toast('Failed to save edit: ' + err.message, 'error');
        }
    };

    const handleRegenerate = async (draftId) => {
        if (!critique.trim()) {
            toast('Enter feedback for regeneration', 'error');
            return;
        }
        try {
            const result = await apiFetch(`/v2/api/drafts/${draftId}/regenerate`, {
                method: 'POST',
                body: JSON.stringify({ critique: critique.trim() }),
            });
            // Refresh draft state with the regenerated draft from the server
            if (result && result.draft) {
                const updated = result.draft;
                const pid = updated.prospect_id;
                setDrafts(prev => {
                    const existing = prev[pid] || [];
                    const idx = existing.findIndex(d => d.id === updated.id || d.sequence_step === updated.sequence_step);
                    if (idx >= 0) {
                        const copy = [...existing];
                        copy[idx] = updated;
                        return { ...prev, [pid]: copy };
                    }
                    return { ...prev, [pid]: [...existing, updated] };
                });
            }
            toast('Draft regenerated', 'info');
            setRegeneratingDraft(null);
            setCritique('');
        } catch (err) {
            toast(err.message, 'error');
        }
    };

    const handleApproveAll = async () => {
        setApproving(true);
        try {
            // Step 1: Flush all local edits to server before approving
            const allLocalDrafts = Object.values(drafts).flat().filter(d => d.id);
            for (const d of allLocalDrafts) {
                await apiFetch(`/v2/api/drafts/${d.id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ subject: d.subject, body: d.body }),
                });
            }
            // Step 2: Approve all drafts (local + workspace, deduped)
            const sessionIds = allLocalDrafts.map(d => d.id);
            const workspaceIds = (workspace.drafts || []).map(d => d.id).filter(Boolean);
            const allDraftIds = [...new Set([...sessionIds, ...workspaceIds])];
            for (const id of allDraftIds) {
                await apiFetch(`/v2/api/drafts/${id}/approve`, { method: 'POST' });
            }
            setDrafts(prev => {
                const updated = {};
                for (const [pid, pidDrafts] of Object.entries(prev)) {
                    updated[pid] = pidDrafts.map(d => ({ ...d, status: 'approved' }));
                }
                return updated;
            });
            setAllApproved(true);
            toast('All drafts approved');
            if (onAllApproved) onAllApproved();
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setApproving(false);
        }
    };

    // Register draft actions on actionsRef for keyboard shortcuts
    useEffect(() => {
        if (!actionsRef) return;
        const generateFirst = () => {
            const firstWithout = actionableProspects.find(p => !(drafts[p.id] && drafts[p.id].length > 0) && !generating[p.id]);
            if (firstWithout) handleGenerate(firstWithout.id);
            else toast('All prospects already have drafts', 'info');
        };
        const nextProspect = () => setFocusedProspectIdx(i => Math.min(i + 1, actionableProspects.length - 1));
        const prevProspect = () => setFocusedProspectIdx(i => Math.max(i - 1, 0));
        // 1/2/3 → jump directly to that prospect
        const selectProspect = (idx) => {
            if (idx >= 0 && idx < actionableProspects.length) setFocusedProspectIdx(idx);
        };
        // Enter → advance to next draft step for focused prospect (or move to next prospect on last step)
        const nextDraftStep = () => {
            const p = actionableProspects[focusedProspectIdx];
            if (!p) return;
            const prospectDrafts = drafts[p.id] || workspace.drafts.filter(d => d.prospect_id === p.id);
            if (!prospectDrafts || prospectDrafts.length === 0) { handleGenerate(p.id); return; }
            const steps = prospectDrafts.map(d => d.sequence_step || d.step_number || 1).sort((a, b) => a - b);
            const currentStep = activeSteps[p.id] || steps[0];
            const currentIdx = steps.indexOf(currentStep);
            if (currentIdx < steps.length - 1) {
                setActiveSteps(prev => ({ ...prev, [p.id]: steps[currentIdx + 1] }));
            } else {
                // Last step — move to next prospect
                setFocusedProspectIdx(i => Math.min(i + 1, actionableProspects.length - 1));
            }
        };
        const jumpToProspect = (num) => {
            const idx = num - 1;
            if (idx < actionableProspects.length) {
                const p = actionableProspects[idx];
                setFocusedProspectIdx(idx);
                setInclusions(prev => ({ ...prev, [p.id]: true }));
                // Auto-generate drafts if none exist yet
                if (!(drafts[p.id] && drafts[p.id].length > 0) && !generating[p.id]) {
                    handleGenerate(p.id);
                }
            }
        };
        const toggleInclude = () => {
            const p = actionableProspects[focusedProspectIdx];
            if (p) setInclusions(prev => ({ ...prev, [p.id]: !prev[p.id] }));
        };
        const openEnrollModal = () => { if (includedProspects.length > 0) setShowEnrollModal(true); };
        const openNoiseModal = () => setShowNoiseModal(true);
        const approveCurrent = () => {
            const p = actionableProspects[focusedProspectIdx];
            if (!p) return;
            const pDrafts = drafts[p.id] || workspace.drafts.filter(d => d.prospect_id === p.id);
            if (approvedProspects.has(p.id) || prospectDraftsAreApproved(pDrafts)) return;
            if (!pDrafts.some(d => d.id && d.body)) {
                toast('Generate a draft first before approving', 'error');
                return;
            }
            handleApproveProspect(p.id);
        };
        actionsRef.current = { ...actionsRef.current, generateDrafts: generateFirst, approveAll: handleApproveAll, approveCurrent, nextProspect, prevProspect, jumpToProspect, nextDraftStep, toggleInclude, openEnrollModal, openNoiseModal };
        return () => { const c = { ...actionsRef.current }; delete c.generateDrafts; delete c.approveAll; delete c.approveCurrent; delete c.nextProspect; delete c.prevProspect; delete c.jumpToProspect; delete c.nextDraftStep; delete c.toggleInclude; delete c.openEnrollModal; delete c.openNoiseModal; actionsRef.current = c; };
    });

    const handleApproveProspect = async (prospectId) => {
        const prospectDrafts = drafts[prospectId] || workspace.drafts.filter(d => d.prospect_id === prospectId);
        const approveableDrafts = prospectDrafts.filter(d => d.id && d.body);
        if (approveableDrafts.length === 0) {
            toast('Generate a draft first — you need to see the email before approving', 'error');
            return;
        }
        setApproving(true);
        try {
            for (const d of approveableDrafts) {
                await apiFetch(`/v2/api/drafts/${d.id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ subject: d.subject, body: d.body }),
                });
                await apiFetch(`/v2/api/drafts/${d.id}/approve`, { method: 'POST' });
            }
            setDrafts(prev => ({
                ...prev,
                [prospectId]: approveableDrafts.map(d => ({ ...d, status: 'approved' })),
            }));
            const nextApproved = new Set([...approvedProspects, prospectId]);
            setApprovedProspects(nextApproved);
            toast(`Approved ${(actionableProspects.find(p => p.id === prospectId)?.first_name) || 'prospect'}'s drafts`);
            // Auto-advance to next unapproved prospect
            const nextUnapproved = actionableProspects.findIndex((p, i) => i > focusedProspectIdx && !nextApproved.has(p.id));
            if (nextUnapproved >= 0) {
                setFocusedProspectIdx(nextUnapproved);
            } else {
                // All approved
                setAllApproved(true);
                if (onAllApproved) onAllApproved();
            }
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setApproving(false);
        }
    };

    return (
        <div className="bg-white rounded-lg border border-slate-200 p-3">
            {/* Prospect rows — one row per prospect, keyboard 1/2/3 to jump */}
            <div className="space-y-1 mb-3">
                {actionableProspects.map((prospect, pIdx) => {
                    const isApproved = approvedProspects.has(prospect.id);
                    const isFocused = pIdx === focusedProspectIdx;
                    const fullName = prospect.full_name || `${prospect.first_name || ''} ${prospect.last_name || ''}`.trim();
                    return (
                        <button key={prospect.id}
                            onClick={() => setFocusedProspectIdx(pIdx)}
                            className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left transition ${
                                isFocused
                                    ? 'bg-brand-50 border border-brand-200'
                                    : isApproved
                                        ? 'bg-green-50 border border-green-200'
                                        : 'bg-white border border-slate-200 hover:border-slate-300 hover:bg-slate-50'
                            }`}>
                            <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[0.625rem] font-bold flex-shrink-0 ${
                                isApproved ? 'bg-green-500 text-white' :
                                isFocused ? 'bg-brand-600 text-white' : 'bg-slate-100 text-slate-400'
                            }`}>{isApproved ? '✓' : pIdx + 1}</span>
                            <div className="min-w-0 flex-1">
                                <div className="flex items-center gap-2">
                                    <span className={`text-sm font-medium truncate ${isFocused ? 'text-brand-700' : 'text-slate-800'}`}>
                                        {fullName || '--'}
                                    </span>
                                    {prospect.title && (
                                        <span className="text-xs text-slate-400 truncate hidden sm:inline">{prospect.title}</span>
                                    )}
                                </div>
                                <div className="flex items-center gap-2 mt-0.5">
                                    <span className="text-xs text-slate-500 font-mono truncate">{prospect.email || '--'}</span>
                                    {prospect.email_verified && (
                                        <span className="text-green-500 flex-shrink-0" title="Verified"><Icon name="check" size={10} /></span>
                                    )}
                                </div>
                            </div>
                            {(workspace.sequences || []).length > 0 && (
                                <select
                                    value={prospectSequences[prospect.id] || workspace.campaign?.sequence_id || ''}
                                    onChange={(e) => {
                                        e.stopPropagation();
                                        handleSequenceChange(prospect.id, e.target.value);
                                    }}
                                    onClick={(e) => e.stopPropagation()}
                                    className="text-[0.625rem] bg-white border border-slate-200 rounded px-1.5 py-0.5 text-slate-600 flex-shrink-0 max-w-[140px] truncate"
                                    title="Email sequence for this prospect"
                                >
                                    {(workspace.sequences || []).map(seq => (
                                        <option key={seq.sequence_id} value={seq.sequence_id}>
                                            {seq.sequence_name.replace('Template - ', '')}
                                        </option>
                                    ))}
                                </select>
                            )}
                            {prospect.linkedin_url && (
                                <a href={prospect.linkedin_url} target="_blank" rel="noopener noreferrer"
                                   onClick={(e) => e.stopPropagation()}
                                   className="text-blue-600 hover:text-blue-700 flex-shrink-0"
                                   title="View LinkedIn profile">
                                    <Icon name="linkedin" size={16} />
                                </a>
                            )}
                        </button>
                    );
                })}
                <div className="flex items-center gap-2 text-[0.625rem] text-slate-400 mt-1 px-1">
                    <Kbd>1</Kbd><Kbd>2</Kbd><Kbd>3</Kbd> jump &nbsp; <Kbd>j</Kbd><Kbd>k</Kbd> navigate &nbsp; <Kbd>a</Kbd> approve
                </div>
            </div>

            {/* Focused prospect — only one visible */}
            {(() => {
                const prospect = actionableProspects[focusedProspectIdx];
                if (!prospect) return null;
                const prospectDrafts = drafts[prospect.id] || workspace.drafts.filter(d => d.prospect_id === prospect.id);
                const currentStep = activeSteps[prospect.id] || 1;
                const activeDraft = prospectDrafts.find(d => (d.sequence_step || d.step_number) === currentStep) || prospectDrafts[0];
                const isApproved = approvedProspects.has(prospect.id) || prospectDraftsAreApproved(prospectDrafts);

                return (
                    <div>
                        {/* Generating indicator */}
                        {generating[prospect.id] && (
                            <div className="flex items-center gap-1.5 text-xs text-slate-400 mb-2">
                                <Icon name="loader" size={12} /> Generating draft...
                            </div>
                        )}

                        {/* No draft yet — big generate prompt */}
                        {prospectDrafts.length === 0 && (
                            <div className="mt-2 border-2 border-dashed border-slate-200 rounded-lg p-8 text-center">
                                <div className="text-slate-400 text-sm mb-3">No draft yet for {prospect.first_name || 'this prospect'}</div>
                                <button onClick={() => handleGenerate(prospect.id)}
                                    disabled={generating[prospect.id]}
                                    className="px-5 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 disabled:opacity-40 transition-all flex items-center gap-2 mx-auto">
                                    {generating[prospect.id]
                                        ? <><Icon name="loader" size={14} /> Generating...</>
                                        : <><Icon name="zap" size={14} /> Generate Draft <Kbd>g</Kbd></>
                                    }
                                </button>
                            </div>
                        )}

                        {/* Draft content — only shown when drafts exist */}
                        {prospectDrafts.length > 0 && (
                            <>
                                {/* Step tabs (only if multiple steps) */}
                                {prospectDrafts.length > 1 && (
                                    <div className="flex gap-1 mb-2 border-b border-slate-100">
                                        {prospectDrafts.map((d, si) => {
                                            const step = d.sequence_step || d.step_number || si + 1;
                                            return (
                                                <button key={d.id || si}
                                                    onClick={() => setActiveSteps(prev => ({ ...prev, [prospect.id]: step }))}
                                                    className={`px-3 py-1.5 text-xs font-medium border-b-2 transition ${
                                                        currentStep === step
                                                            ? 'border-brand-500 text-brand-600'
                                                            : 'border-transparent text-slate-400 hover:text-slate-600'
                                                    }`}>
                                                    Step {step}
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}

                                {activeDraft && (
                                    <>
                                        <div className="flex items-center justify-between mb-1.5">
                                            <span className={`text-[0.625rem] px-1.5 py-0.5 rounded-full font-medium ${
                                                isApproved ? 'bg-green-100 text-green-700' :
                                                activeDraft.status === 'approved' ? 'bg-green-100 text-green-700' :
                                                activeDraft.status === 'edited' ? 'bg-amber-100 text-amber-700' :
                                                'bg-slate-100 text-slate-500'
                                            }`}>
                                                {isApproved ? 'approved' : activeDraft.status || 'draft'}
                                            </span>
                                            {activeDraft.id && !isApproved && (
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => handleGenerate(prospect.id)}
                                                        disabled={generating[prospect.id]}
                                                        className="text-xs text-slate-400 hover:text-slate-600 flex items-center gap-1">
                                                        <Icon name="refresh-cw" size={11} /> New version
                                                    </button>
                                                    <button onClick={() => { setRegeneratingDraft(regeneratingDraft === activeDraft.id ? null : activeDraft.id); setCritique(''); }}
                                                        className="text-xs text-brand-600 hover:text-brand-700 flex items-center gap-1">
                                                        <Icon name="message-square" size={11} /> Feedback
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                        {activeDraft.subject && (
                                            <input type="text" key={`subj-${activeDraft.id}-${activeDraft.updated_at || ''}`}
                                                defaultValue={activeDraft.subject}
                                                readOnly={isApproved}
                                                onBlur={e => { if (activeDraft.id && !isApproved && e.target.value !== activeDraft.subject) handleDraftEdit(activeDraft.id, 'subject', e.target.value); }}
                                                className={`w-full text-sm font-medium border border-slate-200 rounded-md px-3 py-1.5 mb-1.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500/20 ${isApproved ? 'bg-green-50 border-green-200' : ''}`} />
                                        )}
                                        {activeDraft.generation_notes && (
                                            <div className="mb-2 rounded-md border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-800">
                                                {activeDraft.generation_notes}
                                            </div>
                                        )}
                                        <AutoTextarea
                                            value={activeDraft.body || ''}
                                            readOnly={isApproved}
                                            onChange={e => {
                                                if (isApproved) return;
                                                setDrafts(prev => {
                                                    const updated = { ...prev };
                                                    for (const pid of Object.keys(updated)) {
                                                        updated[pid] = updated[pid].map(d =>
                                                            d.id === activeDraft.id ? { ...d, body: e.target.value } : d
                                                        );
                                                    }
                                                    return updated;
                                                });
                                            }}
                                            onBlur={e => { if (activeDraft.id && !isApproved && e.target.value !== activeDraft.body) handleDraftEdit(activeDraft.id, 'body', e.target.value); }}
                                            className={`text-slate-600 text-sm leading-relaxed ${isApproved ? 'bg-green-50' : ''}`}
                                            placeholder="Draft body will appear here..." />
                                        {regeneratingDraft === activeDraft.id && (
                                            <div className="mt-2 flex gap-2">
                                                <input value={critique} onChange={e => setCritique(e.target.value)}
                                                    onKeyDown={e => e.key === 'Enter' && handleRegenerate(activeDraft.id)}
                                                    placeholder="What should change? (Enter to send)"
                                                    autoFocus
                                                    className="flex-1 text-sm border border-slate-200 rounded-md px-3 py-1.5 focus:outline-none focus:border-brand-500" />
                                                <button onClick={() => handleRegenerate(activeDraft.id)}
                                                    className="px-3 py-1.5 bg-brand-600 text-white text-xs rounded-md hover:bg-brand-700 transition-all">
                                                    Send
                                                </button>
                                            </div>
                                        )}
                                    </>
                                )}

                                {/* Approve button — only when there's actual body content to approve */}
                                {activeDraft && activeDraft.body && !isApproved && (
                                    <button onClick={() => handleApproveProspect(prospect.id)}
                                        disabled={approving}
                                        className="mt-4 w-full px-4 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-lg hover:bg-green-700 disabled:opacity-40 transition-all flex items-center justify-center gap-2">
                                        {approving ? <><Icon name="loader" size={14} /> Approving...</> : <><Icon name="check" size={14} /> Approve & Next <Kbd>a</Kbd></>}
                                    </button>
                                )}
                                {isApproved && (
                                    <div className="mt-3 text-center text-xs text-green-600 font-medium py-2 flex items-center justify-center gap-1">
                                        <Icon name="check-circle" size={12} /> Approved — <Kbd>j</Kbd><Kbd>k</Kbd> to navigate
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                );
            })()}

            {/* Post-action: enrolled */}
            {postAction === 'enrolled' && (
                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-6 text-center">
                    <div className="text-3xl mb-2 text-emerald-600">&#10003;</div>
                    <h3 className="text-lg font-bold text-emerald-800 mb-1">
                        {includedProspects.length} contact{includedProspects.length !== 1 ? 's' : ''} enrolled
                    </h3>
                    <p className="text-sm text-emerald-600 mb-3">{workspace.account.company_name} — {workspace.campaign?.name || 'Campaign'}</p>
                    <div className="text-xs text-slate-500 space-y-0.5">
                        {includedProspects.map(p => (
                            <div key={p.id}>{p.full_name || p.email} ({p.email})</div>
                        ))}
                    </div>
                </div>
            )}

            {/* Post-action: noise */}
            {postAction === 'noise' && (
                <div className="mt-4 bg-slate-50 border border-slate-200 rounded-lg p-6 text-center">
                    <div className="text-3xl mb-2 text-slate-400">&#10005;</div>
                    <h3 className="text-lg font-bold text-slate-700 mb-1">
                        {workspace.account.company_name} marked as noise
                    </h3>
                    <p className="text-sm text-slate-500">All signals for this account have been archived.</p>
                </div>
            )}

            {/* Enroll confirmation modal */}
            {showEnrollModal && (
                <EnrollConfirmModal
                    prospects={includedProspects}
                    campaignName={workspace.campaign?.name || 'Campaign'}
                    onCancel={() => setShowEnrollModal(false)}
                    onConfirm={() => {
                        setShowEnrollModal(false);
                        // Trigger actual enrollment via the Enrollment component
                        if (actionsRef?.current?.enrollAll) actionsRef.current.enrollAll(includedProspects.map(p => p.id));
                    }}
                />
            )}

            {/* Noise confirmation modal */}
            {showNoiseModal && (
                <NoiseConfirmModal
                    companyName={workspace.account.company_name}
                    onCancel={() => setShowNoiseModal(false)}
                    onConfirm={() => {
                        setShowNoiseModal(false);
                        setPostAction('noise');
                    }}
                />
            )}
        </div>
    );
}

// SECTION 5 — ENROLLMENT
// ═══════════════════════════════════════════════════════════════════════════

function Enrollment({ workspace, onNextSignal, toast, actionsRef }) {
    const prospects = (workspace.prospects || []).filter(p => !p.do_not_contact);
    const terminalStatuses = ['enrolled', 'skipped'];
    const [statuses, setStatuses] = useState(() => {
        const initial = {};
        prospects.forEach(p => {
            if (['enrolled', 'sequence_complete'].includes(p.enrollment_status)) {
                initial[p.id] = 'enrolled';
            } else if (p.enrollment_status === 'skipped') {
                initial[p.id] = 'skipped';
            }
        });
        return initial;
    });
    const [errors, setErrors] = useState({});
    const [bulkResults, setBulkResults] = useState(null);
    const [enrollingAll, setEnrollingAll] = useState(false);
    const [sequenceId, setSequenceId] = useState(workspace.campaign?.sequence_id || '699a30753ab26800215fa07e');
    const [sequenceName, setSequenceName] = useState(workspace.campaign?.sequence_name || 'Template - 4 Email (Single Thread)');
    const [showSeqPicker, setShowSeqPicker] = useState(false);

    if (prospects.length === 0) return null;

    const handleEnroll = async (prospectId) => {
        setStatuses(prev => ({ ...prev, [prospectId]: 'enrolling' }));
        setErrors(prev => { const n = { ...prev }; delete n[prospectId]; return n; });
        try {
            await apiFetch('/v2/api/enrollment/enroll', {
                method: 'POST',
                body: JSON.stringify({ prospect_id: prospectId, sequence_id: sequenceId }),
            });
            setStatuses(prev => ({ ...prev, [prospectId]: 'enrolled' }));
            toast('Prospect enrolled');
            return 'enrolled';
        } catch (err) {
            const skipped = String(err.message || '').toLowerCase().includes('skipped contact');
            if (skipped) {
                setStatuses(prev => ({ ...prev, [prospectId]: 'skipped' }));
                setErrors(prev => { const n = { ...prev }; delete n[prospectId]; return n; });
                toast(err.message, 'info');
                return 'skipped';
            }
            setStatuses(prev => ({ ...prev, [prospectId]: 'failed' }));
            setErrors(prev => ({ ...prev, [prospectId]: err.message }));
            toast(err.message, 'error');
            return 'failed';
        }
    };

    const handleEnrollAll = async (selectedProspectIds = null) => {
        setEnrollingAll(true);
        setBulkResults(null);
        const selectedIdSet = new Set(Array.isArray(selectedProspectIds) ? selectedProspectIds : []);
        const targetProspects = selectedIdSet.size > 0
            ? prospects.filter(p => selectedIdSet.has(p.id))
            : prospects;
        const remaining = targetProspects.filter(p => !terminalStatuses.includes(statuses[p.id]));
        const ids = remaining.map(p => p.id);

        if (ids.length === 0) {
            setEnrollingAll(false);
            toast('All selected prospects are already processed', 'info');
            return;
        }

        // Mark all as enrolling
        const enrollingMap = {};
        ids.forEach(id => { enrollingMap[id] = 'enrolling'; });
        setStatuses(prev => ({ ...prev, ...enrollingMap }));

        try {
            const resp = await apiFetch('/v2/api/enrollment/bulk', {
                method: 'POST',
                body: JSON.stringify({ prospect_ids: ids, sequence_id: sequenceId }),
            });

            // Apply per-prospect results
            const newStatuses = {};
            const newErrors = {};
            (resp.details || []).forEach(d => {
                if (d.skipped) {
                    newStatuses[d.prospect_id] = 'skipped';
                } else if (d.success) {
                    newStatuses[d.prospect_id] = 'enrolled';
                } else {
                    newStatuses[d.prospect_id] = 'failed';
                    if (d.error) newErrors[d.prospect_id] = d.error;
                }
            });
            setStatuses(prev => ({ ...prev, ...newStatuses }));
            setErrors(prev => ({ ...prev, ...newErrors }));
            setBulkResults(resp);
        } catch (err) {
            // Network-level failure — mark all as failed
            const failMap = {};
            ids.forEach(id => { failMap[id] = 'failed'; });
            setStatuses(prev => ({ ...prev, ...failMap }));
            toast(err.message, 'error');
        } finally {
            setEnrollingAll(false);
        }
    };

    const actionableCount = prospects.filter(p => !terminalStatuses.includes(statuses[p.id]) && statuses[p.id] !== 'enrolling').length;
    const completedCount = prospects.length - actionableCount;
    const allDone = actionableCount === 0;

    // Register enroll action on actionsRef for keyboard shortcut (E)
    useEffect(() => {
        if (!actionsRef) return;
        actionsRef.current = { ...actionsRef.current, enrollAll: handleEnrollAll };
        return () => { const c = { ...actionsRef.current }; delete c.enrollAll; actionsRef.current = c; };
    });

    const statusIcon = (pid) => {
        const s = statuses[pid];
        if (s === 'enrolling') return <Icon name="loader" size={14} className="text-brand-600" />;
        if (s === 'enrolled') return <Icon name="check" size={14} className="text-green-600" />;
        if (s === 'skipped') return <Icon name="skip-forward" size={14} className="text-amber-500" />;
        if (s === 'failed') return <Icon name="x" size={14} className="text-red-500" />;
        return null;
    };

    const statusLabel = (pid) => {
        const s = statuses[pid];
        if (s === 'enrolling') return 'Enrolling...';
        if (s === 'enrolled') return 'Enrolled';
        if (s === 'skipped') return 'Skipped';
        if (s === 'failed') return errors[pid] || 'Failed';
        return 'Pending';
    };

    return (
        <div className="bg-white rounded-lg border border-slate-200 p-3">
            <h3 className="text-xs font-semibold text-slate-900 mb-2 flex items-center gap-1.5">
                <Icon name="send" size={13} className="text-brand-600" />
                Enrollment
                {completedCount > 0 && (
                    <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full ml-2">
                        {completedCount}/{prospects.length}
                    </span>
                )}
            </h3>

            {/* Sequence selector */}
            <div className="flex items-center gap-2 mb-2 text-xs">
                <span className="text-slate-500">Sequence:</span>
                <span className="font-medium text-slate-700">{sequenceName}</span>
                <button onClick={() => setShowSeqPicker(!showSeqPicker)}
                    className="text-brand-600 hover:text-brand-700 underline">
                    {showSeqPicker ? 'cancel' : 'change'}
                </button>
            </div>
            {showSeqPicker && (
                <div className="mb-2">
                    <input type="text" placeholder="Apollo Sequence ID"
                        className="text-xs border border-slate-200 rounded px-2 py-1 w-64 focus:outline-none focus:border-brand-500"
                        onKeyDown={e => {
                            if (e.key === 'Enter' && e.target.value.trim()) {
                                setSequenceId(e.target.value.trim());
                                setSequenceName('Custom Sequence');
                                setShowSeqPicker(false);
                                toast('Sequence overridden for this enrollment');
                            }
                        }} />
                    <span className="text-[0.625rem] text-slate-400 ml-2">Press Enter to apply</span>
                </div>
            )}

            {bulkResults && (bulkResults.failed > 0 || bulkResults.skipped > 0) && (
                <div className="mb-3 p-3 rounded-md bg-slate-50 border border-slate-200">
                    <div className="text-xs font-medium text-slate-700 mb-1">Enrollment Results</div>
                    <div className="flex gap-3 text-xs">
                        {bulkResults.enrolled > 0 && (
                            <span className="text-green-600">{bulkResults.enrolled} enrolled</span>
                        )}
                        {bulkResults.failed > 0 && (
                            <span className="text-red-500">{bulkResults.failed} failed</span>
                        )}
                        {bulkResults.skipped > 0 && (
                            <span className="text-amber-500">{bulkResults.skipped} skipped</span>
                        )}
                    </div>
                </div>
            )}

            <div className="space-y-2">
                {prospects.map(p => (
                    <div key={p.id}
                         className={`flex items-center justify-between py-2 px-3 rounded-md border transition-colors ${
                             statuses[p.id] === 'failed' ? 'border-red-200 bg-red-50/50' :
                             statuses[p.id] === 'skipped' ? 'border-amber-200 bg-amber-50/60' :
                             statuses[p.id] === 'enrolled' ? 'border-green-200 bg-green-50/50' :
                             'border-slate-100 hover:bg-slate-50'
                         }`}>
                        <div className="flex items-center gap-3 min-w-0">
                            {statusIcon(p.id)}
                            <div className="min-w-0">
                                <span className="text-sm font-medium text-slate-800 truncate block">
                                    {p.full_name || `${p.first_name || ''} ${p.last_name || ''}`.trim()}
                                </span>
                                <span className="text-xs text-slate-500">{p.title} {p.email ? `-- ${p.email}` : ''}</span>
                                {errors[p.id] && (
                                    <span className="text-xs text-red-500 block mt-0.5">{errors[p.id]}</span>
                                )}
                            </div>
                        </div>
                        <div className="flex items-center gap-2 flex-shrink-0">
                            <span className={`text-xs ${statuses[p.id] === 'enrolled' ? 'text-green-600' : statuses[p.id] === 'skipped' ? 'text-amber-600' : statuses[p.id] === 'failed' ? 'text-red-500' : 'text-slate-400'}`}>
                                {statusLabel(p.id)}
                            </span>
                            {!['enrolled', 'enrolling', 'skipped'].includes(statuses[p.id]) && (
                                <button onClick={() => handleEnroll(p.id)}
                                    className="px-3 py-1 text-xs font-medium text-brand-600 border border-brand-200 rounded-md hover:bg-brand-50 transition-all">
                                    {statuses[p.id] === 'failed' ? 'Retry' : 'Enroll'}
                                </button>
                            )}
                        </div>
                    </div>
                ))}
            </div>

            {!allDone && actionableCount > 0 && (
                <button onClick={handleEnrollAll} disabled={enrollingAll}
                    className="mt-3 w-full px-4 py-2 bg-brand-600 text-white text-sm font-medium rounded-md hover:bg-brand-700 transition-all duration-150 flex items-center justify-center gap-2 disabled:opacity-50">
                    {enrollingAll ? (
                        <><Icon name="loader" size={16} /> Enrolling...</>
                    ) : (
                        <><Icon name="send" size={16} /> Enroll {actionableCount} <Kbd>E</Kbd></>
                    )}
                </button>
            )}

            {allDone && (
                <div className="mt-4 text-center">
                    <div className="text-green-600 text-sm font-medium mb-2 flex items-center justify-center gap-1.5">
                        <Icon name="check" size={16} />
                        Enrollment complete ({completedCount}/{prospects.length} processed)
                    </div>
                    <button onClick={onNextSignal}
                        className="px-6 py-2 bg-brand-600 text-white text-sm font-medium rounded-md hover:bg-brand-700 transition-all inline-flex items-center gap-2">
                        Next Signal
                        <Icon name="chevron-right" size={14} />
                    </button>
                </div>
            )}
        </div>
    );
}
